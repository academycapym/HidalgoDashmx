    <script>
        window.onerror = function(msg, url, lineNo) {

                                color:#E63780;">
                        <h2 style="font-size:20px;font-weight:900;">
                            ⚠️ ERROR
                        </h2>
                        <div style="background:#fce4ec;padding:10px;
                                    font-family:monospace;
                                    font-size:10px;text-align:left;">
                            ${msg}<br>Linea: ${lineNo}
                        </div>
                        <button onclick="location.reload();" 
                                style="margin-top:20px;
                                       background:#019DF4;color:white;
                                       padding:10px;border-radius:10px;
                                       border:none;">

                        </button>
                    </div>`;
            }
            return false;
        };

                                                    PORTABILIDAD EXPERTA (15 Q)
                                                </button>
                                                <button onClick={() => startQuiz('VENTAS')} 
                                                        className="bg-movistar-green text-white p-5 
                                                                   rounded-2xl font-black text-[10px]">
                                                    VENTA CONSULTIVA (15 Q)
                                                </button>
                                                <button onClick={() => startQuiz('COMISIONES')} 
                                                        className="bg-gradient-to-r from-orange-400 
                                                                   to-red-500 text-white p-5 
                                                                   rounded-2xl font-black text-[10px]">
                                                    ESQUEMA COMISIONES (10 Q)
                                                </button>
                                            </div>
                                        </div>
                                    ) : quizState === 'PLAY' ? (
                                        <div className="bg-white p-8 rounded-[2rem] shadow-xl">
                                            <div className="flex justify-between mb-8 border-b pb-4">
                                                <span className="text-[10px] font-black text-gray-300">
                                                    P. {curQ+1}/{questions.length}
                                                </span>
                                                <div className={`font-black text-2xl 
                                                                ${timer<30?'text-red-500':''}`}>
                                                    {Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}
                                                </div>
                                            </div>
                                            <h3 className="text-base font-bold mb-10 leading-tight">
                                                {questions[curQ]?.q}
                                            </h3>
                                            <div className="grid gap-4">
                                                {questions[curQ]?.options.map((o,i) => (
                                                    <button key={i} onClick={()=>handleAns(o.isC)} 
                                                            className="text-left p-4 rounded-2xl border-2 
                                                                       border-gray-100 font-bold text-xs 
                                                                       active:bg-blue-50">
                                                        {o.t}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="bg-white p-10 rounded-[2rem] shadow-2xl text-center">
                                            <div className={`w-24 h-24 rounded-full border-[10px] 
                                                            mx-auto flex items-center justify-center 
                                                            mb-6 font-black text-4xl 
                                                            ${passed?'border-green-500 text-green-500':'border-red-500 text-red-500'}`}>
                                                {score}
                                            </div>
                                            <h2 className="text-2xl font-black mb-6 italic uppercase">
                                                {passed ? "Certificado" : "Reprobado"}
                                            </h2>
                                            {passed && 
                                                <button onClick={() => downloadCert(colaboradorName, curType, new Date().toLocaleDateString(), (dataTEMM?.find(d => d.id === userId.toUpperCase())?.sup || "Nacional"))} 
                                                        className="mb-6 w-full bg-movistar-green text-white 
                                                                   p-5 rounded-2xl font-black uppercase 
                                                                   text-[10px] shadow-lg">
                                                    Descargar PDF 📄
                                                </button>
                                            }
                                            <button onClick={() => setQuizState('MENU')} 
                                                    className="bg-movistar-dark text-white w-full py-5 
                                                               rounded-2xl font-black text-xs">
                                                Terminar
                                            </button>
                                        </div>
                                    )
                                ) : (
                                    <div className="space-y-4">
                                        <div className="bg-movistar-dark p-6 rounded-[2rem] text-white 
                                                        flex justify-between items-center shadow-xl">
                                            <div>
                                                <h2 className="font-black text-lg italic uppercase">
                                                    REPOSITORIO
                                                </h2>
                                            </div>
                                            {userRole === "ADMIN" && 
                                                <button onClick={async ()=>{
                                                    const cat = prompt("Categoria:"); 
                                                    const tit = prompt("Nombre:"); 
                                                    const lnk = prompt("Link:");
                                                    if(cat && tit && lnk && db) {
                                                        await db.collection("recurso")
                                                            .add({ cat: cat.toUpperCase(), tit, lnk });
                                                    }
                                                }} 
                                                className="bg-movistar-blue p-3 rounded-xl 
                                                           font-black text-[9px] shadow-md">+ ADD</button>
                                            }
                                        </div>
                                        {["PORTABILIDAD", "FIELDWY", "SUELDO BASE", "COMISIONES", "VENTA CONSULTIVA", "VARIOS"].map(cat => (
                                            <div key={cat} className="space-y-2">
                                                <p className="text-[10px] font-black text-movistar-blue 
                                                              ml-4 uppercase tracking-widest">
                                                    {cat}
                                                </p>
                                                {Array.isArray(resources) && resources.filter(r=>r?.cat===cat).map((r,i) => (
                                                    <a href={r.lnk} target="_blank" key={i} 
                                                       className="block bg-white p-5 rounded-[1.5rem] 
                                                                  shadow-sm border flex justify-between 
                                                                  items-center">
                                                        <span className="font-bold text-[10px] 
                                                                         uppercase text-movistar-dark">
                                                            {r.tit}
                                                        </span>
                                                        <span className="bg-blue-50 p-2 rounded-lg 
                                                                         text-movistar-blue">⬇️</span>
                                                    </a>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'EQUIPO' && (
                            <div className="space-y-6 animate-pop">
                                <div className="flex bg-gray-200 p-1 rounded-2xl">
                                    <button onClick={()=>setSubTabEquipo("PERFIL")} 
                                            className={`subtab-btn ${subTabEquipo==="PERFIL"?'subtab-active':'subtab-inactive'}`}>MI PERFIL</button>
                                    <button onClick={()=>setSubTabEquipo("EL_MES")} 
                                            className={`subtab-btn ${subTabEquipo==="EL_MES"?'subtab-active':'subtab-inactive'}`}>EL MEJOR</button>
                                    <button onClick={()=>setSubTabEquipo("RANKING")} 
                                            className={`subtab-btn ${subTabEquipo==="RANKING"?'subtab-active':'subtab-inactive'}`}>TOP RANK</button>
                                    <button onClick={()=>setSubTabEquipo("HISTORICO")} 
                                            className={`subtab-btn ${subTabEquipo==="HISTORICO"?'subtab-active':'subtab-inactive'}`}>LOGS</button>
                                </div>

                                {subTabEquipo === "PERFIL" && (
                                    <div className="space-y-4">
                                        <div className="bg-movistar-dark p-6 rounded-[2rem] text-white">
                                            <h2 className="font-black text-base italic uppercase">
                                                Mi Roster
                                            </h2>
                                            <p className="text-[9px] font-bold text-gray-400">
                                                Registrate si compartes PDV.
                                            </p>
                                        </div>
                                        
                                        {userRole === "PROMOTOR" && (
                                            <div className="bg-white p-6 rounded-[2rem] shadow-lg border">
                                                <h3 className="font-black text-xs text-movistar-dark uppercase mb-4">
                                                    Alta de Usuario
                                                </h3>
                                                <input type="text" placeholder="Nombre Completo" 
                                                       value={rostName} onChange={e=>setRostName(e.target.value)} 
                                                       className="w-full bg-gray-50 p-4 rounded-xl 
                                                                  font-bold text-xs mb-2 outline-none"/>
                                                <input type="text" placeholder="Usuario FW" 
                                                       value={rostFw} onChange={e=>setRostFw(e.target.value)} 
                                                       className="w-full bg-gray-50 p-4 rounded-xl 
                                                                  font-bold text-xs mb-2 outline-none"/>
                                                <label className="text-[9px] font-black text-gray-400 ml-2">
                                                    Fecha Ingreso
                                                </label>
                                                <input type="date" value={rostDate} 
                                                       onChange={e=>setRostDate(e.target.value)} 
                                                       className="w-full bg-gray-50 p-4 rounded-xl 
                                                                  font-bold text-xs mb-4 outline-none"/>
                                                <label className="w-full block bg-movistar-blue text-white 
                                                                  py-4 rounded-xl font-black text-[10px] 
                                                                  text-center cursor-pointer mb-2">
                                                    SUBIR FOTO Y GUARDAR
                                                    <input type="file" accept="image/*" 
                                                           className="hidden" onChange={createProfile}/>
                                                </label>
                                            </div>
                                        )}

                                        <div className="space-y-4 mt-6">
                                            {myRosters.map(r => (
                                                <div key={r.id} 
                                                     className="bg-white p-6 rounded-[2rem] shadow-md 
                                                                border-t-4 border-movistar-green flex gap-4">
                                                    <div className="w-16 h-16 rounded-full overflow-hidden 
                                                                    border-2 border-gray-100 flex-shrink-0">
                                                        <img src={r.foto} className="w-full h-full object-cover" />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-black text-xs uppercase">
                                                            {r.nombre}
                                                        </h4>
                                                        <p className="text-[9px] font-bold text-movistar-blue">
                                                            FW: {r.fw}
                                                        </p>
                                                        <p className="text-[8px] font-bold text-gray-400 mt-1">
                                                            Antiguedad: {Math.floor((Date.now() - new Date(r.ingreso).getTime())/86400000)} dias
                                                        </p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {subTabEquipo === "EL_MES" && (
                                    <div className="space-y-4">
                                        <div className="bg-movistar-dark p-6 rounded-[2.5rem] 
                                                        text-white shadow-xl flex justify-between">
                                            <div>
                                                <h2 className="font-black text-lg italic uppercase">
                                                    EL MEJOR
                                                </h2>
                                            </div>
                                            {userRole === "ADMIN" && candidates.length < 4 && 
                                                <label className="bg-movistar-blue p-3 rounded-xl 
                                                                  font-black text-[9px] cursor-pointer">
                                                    + FOTO
                                                    <input type="file" accept="image/*" 
                                                           className="hidden" onChange={addCandidate}/>
                                                </label>
                                            }
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {candidates.map(c => (
                                                <div key={c.id} className="bg-white p-4 rounded-[2rem] 
                                                                           shadow-lg border flex flex-col 
                                                                           items-center">
                                                    <div className="w-24 h-24 rounded-full overflow-hidden 
                                                                    mb-4 border-4 border-movistar-blue">
                                                        <img src={c.foto} className="w-full h-full object-cover"/>
                                                    </div>
                                                    <h4 className="font-black text-[11px] text-center uppercase 
                                                                   mb-2 h-8">{c.nombre}</h4>
                                                    <div className="bg-blue-50 w-full text-center py-2 
                                                                    rounded-xl mb-3">
                                                        <span className="font-black text-movistar-blue text-xl">
                                                            {c.votos ? c.votos.length : 0}
                                                        </span>
                                                    </div>
                                                    {userRole === "PROMOTOR" && 
                                                        <button onClick={()=>voteCandidate(c.id)} 
                                                                className="w-full bg-movistar-blue text-white 
                                                                           py-3 rounded-xl font-black text-[10px]">
                                                            VOTAR ⭐
                                                        </button>
                                                    }
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {subTabEquipo === "RANKING" && (
                                    <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border">
                                        <div className="bg-movistar-dark p-6 text-white">
                                            <h2 className="font-black text-base italic uppercase">Lideres</h2>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead className="bg-gray-50 border-b">
                                                    <tr className="text-[9px] font-black text-gray-400">
                                                        <th className="p-5 text-center">#</th>
                                                        <th className="p-5">NOMBRE</th>
                                                        <th className="p-5 text-right">SCORE</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {Array.isArray(ranking) && ranking.map((u, i) => (
                                                        <tr key={u.id} className="border-b">
                                                            <td className="p-5 text-center font-black">#{i+1}</td>
                                                            <td className="p-5 font-black text-[10px] uppercase">
                                                                {u.name}
                                                            </td>
                                                            <td className="p-5 text-right font-black text-movistar-blue">
                                                                {u.score}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {subTabEquipo === "HISTORICO" && (
                                    <div className="space-y-4">
                                        {Array.isArray(history) && history.filter(h => userRole==="ADMIN" || h?.idpdv===userId.toUpperCase()).map(h => (
                                            <div key={h.id} className="bg-white p-5 rounded-[2rem] shadow-md border-l-8 border-movistar-green flex">
                                                <div className="flex-1 mr-2">
                                                    <p className="text-[7px] font-black text-movistar-blue uppercase mb-1 bg-blue-50 inline-block px-2 rounded">{h.examen}</p>
                                                    <h4 className="font-black text-[11px] uppercase mb-1">{h.nombre}</h4>
                                                    <p className="text-[8px] font-bold text-gray-400">{h.fecha?.toDate().toLocaleDateString('es-MX')}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-2xl font-black text-movistar-dark">{h.puntos}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'PORTAL' && (
                            <div className="space-y-6 animate-pop">
                                <div className="flex bg-gray-200 p-1 rounded-2xl">
                                    <button onClick={()=>setSubTabPortal("CALCULADORA")} className={`subtab-btn ${subTabPortal==="CALCULADORA"?'subtab-active':'subtab-inactive'}`}>SIMULADOR</button>
                                    <button onClick={()=>setSubTabPortal("VACACIONES")} className={`subtab-btn ${subTabPortal==="VACACIONES"?'subtab-active':'subtab-inactive'}`}>VACACIONES</button>
                                    <button onClick={()=>setSubTabPortal("QUEJAS")} className={`subtab-btn ${subTabPortal==="QUEJAS"?'subtab-active':'subtab-inactive'}`}>SUGERENCIAS</button>
                                </div>

                                {subTabPortal === "CALCULADORA" && (
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border">
                                        <h2 className="text-lg font-black mb-2 uppercase text-movistar-dark">Simulador</h2>
                                        
                                        {userRole === "ADMIN" && (
                                            <select value={calcCadena} onChange={e=>setCalcCadena(e.target.value)} 
                                                    className="w-full bg-blue-50 p-3 rounded-xl font-black text-[10px] text-movistar-blue mb-4 outline-none">
                                                <option value="ELEKTRA">ELEKTRA</option>
                                                <option value="COPPEL_SUBURBIA">COPPEL / SUBURBIA</option>
                                            </select>
                                        )}

                                        <div className="grid grid-cols-2 gap-4 mb-6">
                                            <div>
                                                <label className="text-[8px] font-black text-movistar-dark">LOGRO PDV %</label>
                                                <input type="number" placeholder="Ej. 100" value={calcLTotal} onChange={e=>setCalcLTotal(e.target.value)} className="w-full bg-gray-50 p-3 rounded-xl font-bold text-xs mt-1 outline-none text-center"/>
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black text-movistar-dark">LOGRO TEMM %</label>
                                                <input type="number" placeholder="Ej. 95" value={calcLTemm} onChange={e=>setCalcLTemm(e.target.value)} className="w-full bg-gray-50 p-3 rounded-xl font-bold text-xs mt-1 outline-none text-center"/>
                                            </div>
                                        </div>

                                        <h3 className="font-black text-[10px] text-movistar-blue mb-3 border-b pb-1">ALTAS PORTABILIDAD</h3>
                                        <div className="grid grid-cols-3 gap-2 mb-4">
                                            <input type="number" placeholder="$100" value={cP1} onChange={e=>setCP1(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                            <input type="number" placeholder="$150" value={cP2} onChange={e=>setCP2(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                            <input type="number" placeholder="$200" value={cP3} onChange={e=>setCP3(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                        </div>

                                        <h3 className="font-black text-[10px] text-movistar-blue mb-3 border-b pb-1">ALTAS NO PORTA</h3>
                                        <div className="grid grid-cols-3 gap-2 mb-4">
                                            <input type="number" placeholder="$100" value={cNP1} onChange={e=>setCNP1(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                            <input type="number" placeholder="$150" value={cNP2} onChange={e=>setCNP2(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                            <input type="number" placeholder="$200" value={cNP3} onChange={e=>setCNP3(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                        </div>

                                        <h3 className="font-black text-[10px] text-movistar-blue mb-3 border-b pb-1">EQUIPOS TEMM</h3>
                                        <div className="grid grid-cols-3 gap-2 mb-6">
                                            <input type="number" placeholder="$100" value={cT1} onChange={e=>setCT1(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                            <input type="number" placeholder="$150" value={cT2} onChange={e=>setCT2(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                            <input type="number" placeholder="$200" value={cT3} onChange={e=>setCT3(e.target.value)} className="bg-gray-50 p-2 rounded-lg text-center text-xs font-bold outline-none"/>
                                        </div>

                                        <div className="bg-movistar-green text-white p-5 rounded-2xl text-center shadow-lg">
                                            <p className="text-[10px] font-bold uppercase mb-1">Pago Estimado</p>
                                            <p className="text-4xl font-black">${calculatePayout()}</p>
                                        </div>
                                    </div>
                                )}

                                {subTabPortal === "VACACIONES" && (
                                    userRole === "PROMOTOR" ? (
                                        <div className="bg-white p-6 rounded-[2rem] shadow-xl border">
                                            <h2 className="text-lg font-black mb-4 uppercase text-movistar-dark">Dias Libres</h2>
                                            <form onSubmit={submitVac} className="space-y-4">
                                                <input type="text" placeholder="Nombre" required value={vacName} onChange={e=>setVacName(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none"/>
                                                <input type="text" placeholder="Usuario FW" required value={vacUser} onChange={e=>setVacUser(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none"/>
                                                <div>
                                                    <label className="text-[9px] font-black text-gray-400 ml-2">Inicio (Min 15 dias)</label>
                                                    <input type="date" required min={minVacDate} value={vacDate} onChange={e=>setVacDate(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none mt-1"/>
                                                </div>
                                                <div>
                                                    <label className="text-[9px] font-black text-gray-400 ml-2">Dias a pedir</label>
                                                    <input type="number" min="1" max="14" required value={vacDays} onChange={e=>setVacDays(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none mt-1"/>
                                                </div>
                                                <button type="submit" className="w-full bg-movistar-blue text-white p-4 rounded-xl font-black text-[10px]">ENVIAR</button>
                                            </form>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {vacaciones.map(v => (
                                                <div key={v.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm border-l-4 border-movistar-blue">
                                                    <div className="flex justify-between">
                                                        <span className="text-[9px] font-black text-movistar-blue">{v.idpdv}</span>
                                                        <span className="text-[8px] font-bold text-gray-400">{v.fecha?.toDate().toLocaleDateString()}</span>
                                                    </div>
                                                    <h4 className="font-black text-xs uppercase my-1">{v.nombre}</h4>
                                                    <p className="text-[10px] font-bold text-gray-500">
                                                        Pide <span className="text-movistar-dark font-black">{v.diasSolicitados} dias</span> desde <span className="text-movistar-dark font-black">{v.fechaDeseada}</span>
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    )
                                )}

                                {subTabPortal === "QUEJAS" && (
                                    userRole === "PROMOTOR" ? (
                                        <div className="bg-white p-6 rounded-[2rem] shadow-xl border">
                                            <h2 className="text-lg font-black mb-2 uppercase text-movistar-dark">Buzon Operativo</h2>
                                            <form onSubmit={submitSug} className="space-y-4 mt-4">
                                                <textarea required placeholder="Escribe aqui..." rows="5" value={sugText} onChange={e=>setSugText(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none resize-none"></textarea>
                                                <button type="submit" className="w-full bg-movistar-dark text-white p-4 rounded-xl font-black text-[10px]">ENVIAR</button>
                                            </form>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {quejas.map(q => (
                                                <div key={q.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm border-l-4 border-movistar-red">
                                                    <div className="flex justify-between mb-2">
                                                        <span className="text-[9px] font-black text-movistar-red">ID: {q.idpdv}</span>
                                                        <span className="text-[8px] font-bold text-gray-400">{q.fecha?.toDate().toLocaleDateString()}</span>
                                                    </div>
                                                    <p className="text-xs font-bold text-gray-600 italic">"{q.texto}"</p>
                                                </div>
                                            ))}
                                        </div>
                                    )
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
