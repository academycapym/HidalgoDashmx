<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HidalgoDash CAPYM</title>
    
    <!-- Radar de Errores (Si algo falla, te avisará en pantalla) -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var loader = document.getElementById('emergency-loader');
            if (loader) {
                loader.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #E63780; font-family: sans-serif;">
                        <h2 style="font-size: 24px; font-weight: 900; margin-bottom: 10px;">⚠️ ERROR DETECTADO</h2>
                        <p style="font-weight: bold; margin-bottom: 10px;">Toma captura de pantalla de esto y compártelo:</p>
                        <div style="background: #fce4ec; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; word-break: break-all; text-align: left;">
                            Mensaje: ${msg}<br><br>Línea: ${lineNo}
                        </div>
                        <button onclick="localStorage.clear(); location.reload();" style="margin-top: 20px; background: #019DF4; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; border: none;">Borrar Caché y Reiniciar</button>
                    </div>
                `;
            }
            return false;
        };
    </script>

    <!-- Diseño y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Librerías desde Servidores de Alta Velocidad (Cloudflare) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { movistar: { blue: '#019DF4', dark: '#0B2739', green: '#5CB615', red: '#E63780' } },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f3f4f6; margin: 0; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-btn { flex: 1; padding: 14px 2px; font-size: 8px; font-weight: 900; text-align: center; border-bottom: 4px solid transparent; transition: 0.3s; text-transform: uppercase; color: #86888C; }
        .tab-active { border-bottom-color: #5CB615; color: #5CB615; background: white; }
        .login-gradient { background: linear-gradient(180deg, #0B2739 0%, #019DF4 100%); }
        .spinner { width: 45px; height: 45px; border: 5px solid #e5e7eb; border-top: 5px solid #019DF4; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root">
        <div id="emergency-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f3f4f6;">
            <div class="spinner"></div>
            <p style="margin-top: 20px; font-weight: 900; color: #0B2739; font-size: 14px;">CARGANDO SISTEMA...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7jT_0uOIW17wrkqqar97WZdc8qvuoKGI",
            authDomain: "academia-capym.firebaseapp.com",
            projectId: "academia-capym",
            storageBucket: "academia-capym.firebasestorage.app",
            messagingSenderId: "261815103883",
            appId: "1:261815103883:web:aa66d0b8d1b733195bff8e"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- BANCOS DE PREGUNTAS (40 REALES) ---
        const EXAMS = {
            BASICO: [
                { q: "¿Cuál es el objetivo principal de la Portabilidad?", options: ["Conservar el número al cambiar de compañía.", "Obtener número nuevo.", "Baja de línea.", "Transferir saldo."], ans: 0 },
                { q: "¿Vigencia del NIP?", options: ["5 días naturales.", "24 horas.", "15 días.", "Ilimitada."], ans: 0 },
                { q: "¿Dígitos del ICC?", options: ["19 dígitos.", "15 dígitos.", "10 dígitos.", "13 dígitos."], ans: 0 },
                { q: "¿Qué significa FVC?", options: ["Fecha de Ventana de Cambio.", "Folio de Venta.", "Firma Valida.", "Fin de Venta."], ans: 0 },
                { q: "¿Quién regula la portabilidad?", options: ["El ABD.", "Movistar.", "El promotor.", "El cliente."], ans: 0 },
                { q: "Si ingresas CURP en Ónix, ¿qué paso evitas?", options: ["Fotos de identificación.", "Pedir NIP.", "Firmar.", "Escanear SIM."], ans: 0 },
                { q: "¿Número para pedir NIP?", options: ["051", "*611", "050", "*123"], ans: 0 },
                { q: "¿Qué pasa si es Persona Moral?", options: ["Rechazo ABD.", "Pasa normal.", "Tarda más.", "No requiere NIP."], ans: 0 },
                { q: "¿Horario ejecución portabilidades?", options: ["2:00 AM a 6:00 AM.", "Mediodía.", "Captura.", "10:00 PM."], ans: 0 },
                { q: "Motivo rechazo Back Office:", options: ["Fotos borrosas.", "Señal.", "NIP expirado.", "Chip dañado."], ans: 0 }
            ],
            EXPERTO: [
                { q: "Error Code 3059:", options: ["Proceso previo activo.", "NIP mal.", "SIM usada.", "Sin red."], ans: 0 },
                { q: "Horario Back Office:", options: ["Lunes a Sábado 9-17h.", "24/7.", "Lunes a Viernes 8-20h.", "Solo Domingos."], ans: 0 },
                { q: "Reinyección 'Order not exist':", options: ["Trámite nuevo.", "Reiniciar App.", "Nuevo NIP.", "Soporte 2L."], ans: 0 },
                { q: "¿Qué valida al Suscriptor Prepago?", options: ["SIM física y SMS.", "Factura.", "Identificación.", "IDPV."], ans: 0 },
                { q: "Equipo liberado se marca como:", options: ["BYOD.", "Externo.", "Smartphone.", "Genérico."], ans: 0 },
                { q: "'En espera de envío' es:", options: ["Revisión BO Prepago.", "NIP validado.", "Portado.", "Falta recarga."], ans: 0 },
                { q: "Sin llamadas post-FVC:", options: ["Escalar 2L.", "Esperar 48h.", "Reinyectar.", "Cargar $50."], ans: 0 },
                { q: "Llamadas al 051 permitidas:", options: ["Máximo 2.", "Ilimitadas.", "Una.", "Cero."], ans: 0 },
                { q: "Datos para 2L:", options: ["ID Prov, IDPV, DN, ICC.", "Nombre y CURP.", "Folio y Marca.", "Correo y Pass."], ans: 0 },
                { q: "Validación ABD es:", options: ["Verificando NIP.", "Revisando fotos.", "Ya es Movistar.", "Rechazo deuda."], ans: 0 },
                { q: "Descargar Ónix de:", options: ["asistentemovistar.com.mx", "Play Store.", "WhatsApp.", "Google."], ans: 0 },
                { q: "Documento NO válido:", options: ["Credencial trabajo.", "INE.", "Pasaporte.", "Cédula."], ans: 0 },
                { q: "ABD rechaza NIP mal:", options: ["Reinyección.", "Trámite nuevo.", "Soporte.", "Ajustes."], ans: 0 },
                { q: "Rechazo por Donador:", options: ["Compañía anterior bloqueó.", "Movistar rechazó.", "NIP mal.", "Sin señal."], ans: 0 },
                { q: "Tiempo respuesta ABD:", options: ["90 min hábiles.", "24 horas.", "Inmediata.", "48 horas."], ans: 0 }
            ],
            VENTAS: [
                { q: "¿Objetivo Venta Consultiva?", options: ["Indagar necesidad.", "Vender caro.", "Hablar mucho.", "Despachar."], ans: 0 },
                { q: "Característica vs Beneficio:", options: ["Técnica vs Utilidad.", "Precio vs Regalo.", "Son igual.", "Local vs Nacional."], ans: 0 },
                { q: "¿Preguntas Abiertas para?", options: ["Información detallada.", "Sí/No.", "Cerrar.", "Presupuesto."], ans: 0 },
                { q: "Ante 'Está caro':", options: ["Empatizar y dar valor.", "Ignorar.", "Enojo.", "Bajar precio."], ans: 0 },
                { q: "Pregunta '¿Qué necesito?':", options: ["Señal de Compra.", "Objeción.", "Duda.", "Distracción."], ans: 0 },
                { q: "Cierre de Ventas es:", options: ["Acción concreta trato.", "Dar bolsa.", "Llenar Ónix.", "Saludar."], ans: 0 },
                { q: "Up-Selling es:", options: ["Plan superior.", "Accesorios.", "Venta cruzada.", "Marca."], ans: 0 },
                { q: "Cross-Selling es:", options: ["Complementos.", "Otro chip.", "Porta.", "Sondeo."], ans: 0 },
                { q: "Escucha Activa es:", options: ["Contacto visual y parafrasear.", "Celular.", "Interrumpir.", "Mirar fuera."], ans: 0 },
                { q: "Romper el Hielo:", options: ["Generar empatía.", "Presupuesto.", "Specs.", "Reírse."], ans: 0 },
                { q: "Ante 'Lo voy a pensar':", options: ["Preguntar duda específica.", "Acaba mañana.", "Ignorar.", "Quitar equipo."], ans: 0 },
                { q: "Vender Valor es:", options: ["Mejorar vida cliente.", "Menor precio.", "Regalar.", "Historia."], ans: 0 },
                { q: "Post-Venta vital para:", options: ["Fidelizar y referidos.", "Cobrar.", "Protocolo.", "Nada."], ans: 0 },
                { q: "Brazo cruzado es:", options: ["Barrera e interés bajo.", "Profesional.", "Concentrado.", "Líder."], ans: 0 },
                { q: "Cliente molesto:", options: ["Calma y solución.", "Gritar.", "Ignorar.", "Seguridad."], ans: 0 }
            ]
        };

        const App = () => {
            const [view, setView] = useState("LOGIN");
            const [userRole, setUserRole] = useState("");
            const [userId, setUserId] = useState("");
            const [pass, setPass] = useState("");
            const [activeTab, setActiveTab] = useState("OPERACION");
            
            const [dataTEMM, setDataTEMM] = useState([]);
            const [dataINV, setDataINV] = useState([]);
            const [ranking, setRanking] = useState([]);
            const [history, setHistory] = useState([]);
            const [resources, setResources] = useState([]);
            const [loading, setLoading] = useState(true);

            const [supFilter, setSupFilter] = useState("TODOS");
            const [cadFilter, setCadFilter] = useState("TODAS");

            const [subTabAcademia, setSubTabAcademia] = useState("EXAMENES");
            const [quizState, setQuizState] = useState('MENU');
            const [colaboradorName, setColaboradorName] = useState("");
            const [questions, setQuestions] = useState([]);
            const [curQ, setCurQ] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [timer, setTimer] = useState(180);
            const [curType, setCurType] = useState('');

            useEffect(() => {
                // Borrar loader si React inicia bien
                const loader = document.getElementById('emergency-loader');
                if(loader) loader.style.display = 'none';
                
                auth.signInAnonymously().catch(e => console.error("Firebase Auth", e));
                
                const unsubOp = db.collection("operacion").onSnapshot(snap => {
                    snap.forEach(doc => {
                        if (doc.id === "temm") setDataTEMM(doc.data().list || []);
                        if (doc.id === "inv") setDataINV(doc.data().list || []);
                    });
                    setLoading(false);
                }, err => { console.error(err); setLoading(false); });
                
                const unsubRank = db.collection("ranking").orderBy("score", "desc").onSnapshot(s => setRanking(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubHist = db.collection("historicos").orderBy("fecha", "desc").onSnapshot(s => setHistory(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubRepo = db.collection("recurso").onSnapshot(s => setResources(s.docs.map(d=>({id:d.id, ...d.data()}))));
                
                return () => { unsubOp(); unsubRank(); unsubHist(); unsubRepo(); };
            }, []);

            useEffect(() => {
                let t = null;
                if (quizState === 'PLAY' && timer > 0) t = setInterval(() => setTimer(v => v - 1), 1000);
                else if (quizState === 'PLAY' && timer === 0) setQuizState('RESULT');
                return () => clearInterval(t);
            }, [quizState, timer]);

            const handleLogin = (e) => {
                e.preventDefault();
                const u = userId.trim().toUpperCase();
                if (u === "ADMIN" && pass === "2024") { setUserRole("ADMIN"); setView("APP"); }
                else if (pass === "Movistar1" && u.length >= 4) { setUserRole("PROMOTOR"); setView("APP"); }
                else { alert("Acceso Incorrecto."); }
            };

            const uploadFile = async (type, e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        const sheetKey = type === "temm" ? "seg diario" : "tiendas";
                        const wsName = wb.SheetNames.find(n => n.toLowerCase().includes(sheetKey));
                        if (!wsName) return alert(`Hoja '${sheetKey}' no encontrada.`);
                        const json = XLSX.utils.sheet_to_json(wb.Sheets[wsName], { header: "A", defval: "" });
                        let list = [];
                        if (type === "temm") {
                            list = json.filter(r => r["J"] && String(r["J"]).length > 3 && !String(r["J"]).includes("PDV")).map(r => ({
                                id: String(r["I"] || "").trim().replace(/^0+/, ''),
                                tienda: String(r["J"]).trim(),
                                sup: String(r["B"]).trim(),
                                cad: String(r["L"]).toUpperCase().includes("EKT") ? "ELEKTRA" : (String(r["L"]).toUpperCase().includes("COPPEL") ? "COPPEL" : "SUBURBIA"),
                                altas: Math.round(r["Q"] || 0), cuota: Math.round(r["R"] || 0), gap: Math.round(r["S"] || 0)
                            }));
                        } else {
                            list = json.filter(r => r["I"] && String(r["I"]).length > 3).map(r => ({
                                id: String(r["I"] || "").trim().replace(/^0+/, ''),
                                mod: String(r["T"] || "").trim(), mar: String(r["U"] || "").trim(), q: parseInt(r["AG"] || 0)
                            }));
                        }
                        await db.collection("operacion").doc(type).set({ list });
                        alert("¡Sincronizado correctamente!");
                    } catch (error) {
                        alert("Hubo un error al procesar el Excel.");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const startQuiz = (type) => {
                if (!colaboradorName.trim()) return alert("Nombre obligatorio.");
                setCurType(type);
                const shuffled = [...EXAMS[type]].sort(() => 0.5 - Math.random()).map(q => ({
                    ...q, options: q.options.map((o, i) => ({ t: o, isC: i === q.ans })).sort(() => 0.5 - Math.random())
                }));
                setQuestions(shuffled); setCurQ(0); setAnswers([]); setTimer(180); setQuizState('PLAY');
            };

            const handleAns = (isC) => {
                const nextA = [...answers, isC]; setAnswers(nextA);
                if (curQ + 1 < questions.length) setCurQ(v => v + 1);
                else setQuizState('RESULT');
            };

            const score = answers.filter(Boolean).length;
            const passed = score >= Math.ceil(questions.length * 0.8);
            const pts = (score * 5) + (passed ? timer : 0);

            const downloadCert = (name, module, date, supervisor) => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                    doc.setDrawColor(1, 157, 244); doc.setLineWidth(2); doc.rect(5, 5, 287, 200);
                    doc.setFont("helvetica", "bold"); doc.setFontSize(38); doc.setTextColor(11, 39, 57);
                    doc.text("CERTIFICADO NACIONAL", 148, 50, { align: 'center' });
                    doc.setFontSize(16); doc.setFont("helvetica", "normal");
                    doc.text("HidalgoDash CAPYM otorga el presente a:", 148, 70, { align: 'center' });
                    doc.setFontSize(32); doc.setFont("helvetica", "bold"); doc.setTextColor(92, 182, 21);
                    doc.text(name.toUpperCase(), 148, 95, { align: 'center' });
                    doc.setFontSize(14); doc.setTextColor(11, 39, 57);
                    doc.text(`Por acreditar el módulo: ${module}`, 148, 120, { align: 'center' });
                    doc.setFontSize(11); doc.text(`Fecha: ${date}`, 148, 135, { align: 'center' });
                    doc.line(50, 180, 120, 180); doc.text(supervisor || "SUPERVISOR", 85, 186, { align: 'center' });
                    doc.line(177, 180, 247, 180); doc.text("C.P. ANGEL ROIZ", 212, 186, { align: 'center' });
                    doc.save(`Certificado_${name.replace(/\s/g, '_')}.pdf`);
                } catch(e) {
                    alert("Error descargando el PDF. Abre la página en Chrome o Safari.");
                }
            };

            useEffect(() => {
                if(quizState === 'RESULT' && passed) {
                    const name = colaboradorName.trim().toUpperCase();
                    const logId = userId.trim().toUpperCase();
                    const sName = userRole === "ADMIN" ? "ADMIN" : (dataTEMM.find(d => d.id === userId.trim().replace(/^0+/, ''))?.sup || "SUPERVISOR");
                    db.collection("historicos").add({ idpdv: logId, nombre: name, examen: curType, puntos: pts, sup: sName, fecha: firebase.firestore.FieldValue.serverTimestamp() });
                    db.collection("ranking").where("name", "==", name).get().then(snap => {
                        if (!snap.empty) snap.docs[0].ref.update({ score: snap.docs[0].data().score + pts, badges: Array.from(new Set([...(snap.docs[0].data().badges || []), curType])) });
                        else db.collection("ranking").add({ name, score: pts, badges: [curType] });
                    });
                }
            }, [quizState]);

            const filteredData = useMemo(() => {
                let f = dataTEMM;
                if (userRole === "PROMOTOR") f = dataTEMM.filter(d => d.id === userId.trim().replace(/^0+/, ''));
                else {
                    if (supFilter !== "TODOS") f = f.filter(d => d.sup === supFilter);
                    if (cadFilter !== "TODAS") f = f.filter(d => d.cad === cadFilter);
                }
                return f;
            }, [dataTEMM, userRole, userId, supFilter, cadFilter]);

            const summary = useMemo(() => {
                let a=0, c=0, g=0, s=0;
                filteredData.forEach(d => { a+=d.altas; c+=d.cuota; g+=d.gap; s+=dataINV.filter(i=>i.id===d.id).reduce((acc,cur)=>acc+cur.q,0); });
                return { a, c, g, s };
            }, [filteredData, dataINV]);

            if (view === "LOGIN") return (
                <div className="min-h-screen login-gradient flex items-center justify-center p-6 animate-pop">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm">
                        <div className="text-center mb-10"><h1 className="text-movistar-blue text-4xl font-black italic tracking-tighter uppercase leading-none">HIDALGODASH</h1><p className="text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-widest">Capym Nacional</p></div>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <input type="text" placeholder="IDPDV / USUARIO" className="w-full bg-gray-50 border-none rounded-2xl p-5 font-bold outline-none focus:ring-2 focus:ring-movistar-blue" value={userId} onChange={e => setUserId(e.target.value)} required />
                            <input type="password" placeholder="CONTRASEÑA" className="w-full bg-gray-50 border-none rounded-2xl p-5 font-bold outline-none focus:ring-2 focus:ring-movistar-blue" value={pass} onChange={e => setPass(e.target.value)} required />
                            <button className="w-full bg-movistar-blue text-white p-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all">INGRESAR</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-gray-100 max-w-md mx-auto shadow-2xl relative animate-pop">
                    <div className="bg-movistar-dark text-white p-5 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex flex-col"><h2 className="font-black italic text-lg leading-none uppercase">HIDALGODASH</h2><span className="text-[8px] font-bold text-movistar-blue mt-1 uppercase">CAPYM OPERACIÓN</span></div>
                        <div className="text-right text-[9px] font-black">{userRole === "ADMIN" ? "ADMIN" : `ID: ${userId}`}<br/><button onClick={() => location.reload()} className="text-movistar-red font-bold uppercase mt-1">Salir</button></div>
                    </div>

                    <div className="bg-white flex sticky top-[68px] z-40 border-b shadow-sm overflow-x-auto hide-scrollbar">
                        <button className={`tab-btn ${activeTab==='OPERACION'?'tab-active':''}`} onClick={()=>setActiveTab('OPERACION')}>Operación</button>
                        <button className={`tab-btn ${activeTab==='ACADEMIA'?'tab-active':''}`} onClick={()=>setActiveTab('ACADEMIA')}>Academia</button>
                        <button className={`tab-btn ${activeTab==='RANKING'?'tab-active':''}`} onClick={()=>setActiveTab('RANKING')}>Ranking</button>
                        <button className={`tab-btn ${activeTab==='HISTORICOS'?'tab-active':''}`} onClick={()=>setActiveTab('HISTORICOS')}>Historial</button>
                    </div>

                    <div className="p-4 flex-grow overflow-y-auto pb-10">
                        {activeTab === 'OPERACION' && (
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="bg-white p-4 rounded-3xl border shadow-sm"><p className="text-[8px] font-black text-movistar-green uppercase mb-1">Altas</p><p className="text-3xl font-black text-movistar-green tabular-nums">{summary.a}</p></div>
                                    <div className="bg-white p-4 rounded-3xl border shadow-sm"><p className="text-[8px] font-black text-gray-400 uppercase mb-1">Meta</p><p className="text-3xl font-black opacity-10 tabular-nums">{summary.c}</p></div>
                                    <div className="bg-white p-4 rounded-3xl border shadow-sm"><p className="text-[8px] font-black text-gray-400 uppercase mb-1">Gap</p><p className={`text-3xl font-black tabular-nums ${summary.g>=0?'text-movistar-green':'text-movistar-red'}`}>{summary.g>=0?'+':''}{summary.g}</p></div>
                                    <div className="bg-white p-4 rounded-3xl border shadow-sm"><p className="text-[8px] font-black text-movistar-blue uppercase mb-1">Stock</p><p className="text-3xl font-black text-movistar-blue tabular-nums">{summary.s}</p></div>
                                </div>
                                {userRole === "ADMIN" && (
                                    <div className="bg-white p-5 rounded-[2rem] border shadow-sm space-y-4">
                                        <div className="flex gap-2">
                                            <select className="flex-1 text-[9px] font-black bg-gray-50 p-3 rounded-xl outline-none" value={supFilter} onChange={e => setSupFilter(e.target.value)}><option value="TODOS">SUPERVISORES</option>{[...new Set(dataTEMM.map(d => d.sup))].sort().map(s => <option key={s} value={s}>{s}</option>)}</select>
                                            <select className="flex-1 text-[9px] font-black bg-gray-50 p-3 rounded-xl outline-none" value={cadFilter} onChange={e => setCadFilter(e.target.value)}><option value="TODAS">CADENAS</option><option value="COPPEL">COPPEL</option><option value="ELEKTRA">ELEKTRA</option><option value="SUBURBIA">SUBURBIA</option></select>
                                        </div>
                                        <div className="flex gap-2">
                                            <label className="flex-1 bg-movistar-blue text-white text-[8px] font-black p-4 rounded-2xl text-center cursor-pointer">DIARIO<input type="file" className="hidden" accept=".xlsx" onChange={e => uploadFile("temm", e)}/></label>
                                            <label className="flex-1 bg-movistar-dark text-white text-[8px] font-black p-4 rounded-2xl text-center cursor-pointer">INV<input type="file" className="hidden" accept=".xlsx" onChange={e => uploadFile("inv", e)}/></label>
                                        </div>
                                    </div>
                                )}
                                {filteredData.map(d => (
                                    <div key={d.id} className="bg-white p-6 rounded-[2.5rem] shadow-xl border-l-[10px] border-movistar-blue relative">
                                        <div className="flex justify-between mb-3 text-[10px] font-black text-movistar-blue uppercase"><span>{d.cad}</span><span className="text-gray-300">ID: {d.id}</span></div>
                                        <h3 className="font-black text-sm mb-4 uppercase leading-tight">{d.tienda}</h3>
                                        <div className="flex justify-between items-end mb-2"><div><p className="text-[8px] font-bold text-movistar-green mb-0.5 uppercase tracking-tighter">Altas</p><p className="text-4xl font-black text-movistar-green">{d.altas}</p></div><div className="text-right font-black opacity-10 text-xl"><p className="text-[8px] uppercase">Meta</p><p>{d.cuota}</p></div></div>
                                        <div className="w-full bg-gray-100 h-3 rounded-full overflow-hidden mb-4 shadow-inner"><div className="h-full bg-movistar-green" style={{ width: `${Math.min((d.altas/d.cuota)*100, 100)}%` }}></div></div>
                                        <div className="border-t pt-3 flex flex-wrap gap-2">
                                            {dataINV.filter(i => i.id === d.id).length > 0 ? dataINV.filter(i => i.id === d.id).map((i,idx) => (
                                                <div key={idx} className="bg-gray-50 border rounded px-2 py-1 min-w-[60px] shadow-sm"><p className="text-[6px] font-bold opacity-50 uppercase leading-none">{i.mar} {i.mod}</p><p className="text-[9px] font-black text-movistar-blue uppercase">{i.q} PZS</p></div>
                                            )) : <p className="text-[8px] text-gray-300 font-bold w-full text-center py-2">SIN INVENTARIO</p>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'ACADEMIA' && (
                            <div className="space-y-6">
                                <div className="flex bg-gray-200 p-1 rounded-2xl">
                                    <button onClick={()=>setSubTabAcademia("EXAMENES")} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${subTabAcademia==="EXAMENES"?'bg-white shadow text-movistar-blue':'text-gray-500'}`}>EXÁMENES</button>
                                    <button onClick={()=>setSubTabAcademia("REPOSITORIO")} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${subTabAcademia==="REPOSITORIO"?'bg-white shadow text-movistar-blue':'text-gray-500'}`}>DOCUMENTOS</button>
                                </div>

                                {subTabAcademia === "EXAMENES" ? (
                                    quizState === 'MENU' ? (
                                        <div className="bg-white p-8 rounded-[2rem] shadow-xl text-center border">
                                            <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">🎓</div>
                                            <h2 className="text-2xl font-black mb-1 italic tracking-tighter uppercase">Capacitación</h2>
                                            <p className="text-[10px] text-gray-400 mb-8 font-black uppercase">Ingresa tu nombre para certificar</p>
                                            <input type="text" placeholder="NOMBRE COMPLETO" className="w-full bg-gray-50 border-2 rounded-2xl p-5 mb-8 text-center font-black outline-none focus:border-movistar-blue" value={colaboradorName} onChange={e => setColaboradorName(e.target.value)}/>
                                            <div className="grid gap-3">
                                                <button onClick={() => startQuiz('BASICO')} className="bg-movistar-blue text-white p-5 rounded-2xl font-black uppercase text-xs">PORTA BÁSICO (10 Q)</button>
                                                <button onClick={() => startQuiz('EXPERTO')} className="bg-movistar-dark text-white p-5 rounded-2xl font-black uppercase text-xs">PORTA EXPERTO (15 Q)</button>
                                                <button onClick={() => startQuiz('VENTAS')} className="bg-movistar-green text-white p-5 rounded-2xl font-black uppercase text-xs">VENTA CONSULTIVA (15 Q)</button>
                                            </div>
                                        </div>
                                    ) : quizState === 'PLAY' ? (
                                        <div className="bg-white p-8 rounded-[2rem] shadow-xl animate-fade">
                                            <div className="flex justify-between mb-8 border-b pb-4"><span className="text-[10px] font-black text-gray-300">P. {curQ+1}/{questions.length}</span><div className={`font-black text-2xl ${timer<30?'text-red-500 animate-pulse':''}`}>{Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}</div></div>
                                            <h3 className="text-base font-bold mb-10 leading-tight">{questions[curQ].q}</h3>
                                            <div className="grid gap-4">{questions[curQ].options.map((o,i) => (<button key={i} onClick={()=>handleAns(o.isC)} className="text-left p-4 rounded-2xl border-2 border-gray-100 font-bold active:bg-blue-50 text-xs">{o.t}</button>))}</div>
                                        </div>
                                    ) : (
                                        <div className="bg-white p-10 rounded-[2rem] shadow-2xl text-center border">
                                            <div className={`w-24 h-24 rounded-full border-[10px] mx-auto flex items-center justify-center mb-6 font-black text-4xl ${passed?'border-movistar-green text-movistar-green bg-green-50':'border-movistar-red text-movistar-red bg-red-50'}`}>{score}</div>
                                            <h2 className="text-2xl font-black mb-6 italic uppercase">{passed ? "Certificado" : "Reprobado"}</h2>
                                            {passed && <button onClick={() => downloadCert(colaboradorName, curType, new Date().toLocaleDateString(), (dataTEMM.find(d => d.id === userId.toUpperCase())?.sup || "Nacional"))} className="mb-6 w-full bg-movistar-green text-white p-5 rounded-2xl font-black uppercase text-[10px] shadow-lg">Descargar Certificado 📄</button>}
                                            <button onClick={() => setQuizState('MENU')} className="bg-movistar-dark text-white w-full py-5 rounded-2xl font-black uppercase text-xs">Terminar</button>
                                        </div>
                                    )
                                ) : (
                                    <div className="space-y-4">
                                        <div className="bg-movistar-dark p-6 rounded-[2rem] text-white flex justify-between items-center shadow-xl">
                                            <div><h2 className="font-black text-lg italic uppercase tracking-tighter leading-none">REPOSITORIO</h2><p className="text-[9px] font-bold text-movistar-blue uppercase mt-1 uppercase">Manuales Oficiales</p></div>
                                            {userRole === "ADMIN" && <button onClick={async ()=>{
                                                const cat = prompt("Categoría (PORTABILIDAD, FIELDWY, SUELDO BASE, COMISIONES, VENTA CONSULTIVA, VARIOS):").toUpperCase();
                                                const tit = prompt("Nombre:");
                                                const lnk = prompt("Link:");
                                                if(cat && tit && lnk) await db.collection("recurso").add({ cat, tit, lnk });
                                            }} className="bg-movistar-blue p-3 rounded-xl font-black text-[9px] shadow-md">+ ADD</button>}
                                        </div>
                                        {["PORTABILIDAD", "FIELDWY", "SUELDO BASE", "COMISIONES", "VENTA CONSULTIVA", "VARIOS"].map(cat => (
                                            <div key={cat} className="space-y-2">
                                                <p className="text-[10px] font-black text-movistar-blue ml-4 uppercase tracking-widest leading-none">{cat}</p>
                                                {resources.filter(r=>r.cat===cat).map((r,i) => (
                                                    <a href={r.lnk} target="_blank" key={i} className="block bg-white p-5 rounded-[1.5rem] shadow-sm border flex justify-between items-center"><span className="font-bold text-[10px] uppercase text-movistar-dark">{r.tit}</span><span className="bg-blue-50 p-2 rounded-lg text-movistar-blue">⬇️</span></a>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'RANKING' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border">
                                <div className="bg-movistar-dark p-6 text-white flex justify-between items-center"><h2 className="font-black text-base italic uppercase tracking-tighter">Líderes Academia</h2><span className="text-[8px] font-black bg-movistar-green px-3 py-1 rounded-full uppercase">Vivo</span></div>
                                <div className="overflow-x-auto"><table className="w-full text-left"><thead className="bg-gray-50 border-b"><tr className="text-[9px] font-black text-gray-400 uppercase tracking-widest"><th className="p-5 text-center">#</th><th className="p-5">NOMBRE</th><th className="p-5 text-right">SCORE</th></tr></thead>
                                <tbody>{ranking.map((u, i) => (<tr key={u.id} className="border-b hover:bg-gray-50 transition-all"><td className="p-5 text-center font-black text-gray-200">#{i+1}</td><td className="p-5 font-black text-[10px] uppercase text-movistar-dark leading-none">{u.name}</td><td className="p-5 text-right font-black text-movistar-blue tabular-nums">{u.score}</td></tr>))}</tbody></table></div>
                            </div>
                        )}

                        {activeTab === 'HISTORICOS' && (
                            <div className="space-y-4">
                                <div className="bg-movistar-dark p-6 rounded-[2rem] text-white shadow-lg"><h2 className="font-black text-base italic uppercase tracking-tighter">HISTORIAL LOG</h2><p className="text-[9px] font-black text-movistar-blue uppercase mt-1">Nacional Sincronizado</p></div>
                                {history.filter(h => userRole==="ADMIN" || h.idpdv===userId.toUpperCase()).map(h => (
                                    <div key={h.id} className="bg-white p-5 rounded-[2rem] shadow-md border-l-8 border-movistar-green flex justify-between items-center animate-fade">
                                        <div className="flex-1 mr-2"><p className="text-[8px] font-black text-movistar-blue uppercase mb-1 bg-blue-50 inline-block px-2 rounded tracking-tighter">{h.examen}</p><h4 className="font-black text-[11px] uppercase leading-tight text-movistar-dark mb-1">{h.nombre}</h4><p className="text-[8px] font-bold text-gray-400 uppercase tracking-tighter leading-none">ID: {h.idpdv} • {h.fecha?.toDate().toLocaleDateString('es-MX')}</p></div>
                                        <div className="text-right flex flex-col items-end"><p className="text-2xl font-black text-movistar-dark leading-none">{h.puntos}</p><p className="text-[8px] font-black text-gray-300 uppercase tracking-widest">PTS</p></div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
