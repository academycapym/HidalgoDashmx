    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyA7jT_0uOIW17wrkqqar97WZdc8qvuoKGI",
            authDomain: "academia-capym.firebaseapp.com",
            projectId: "academia-capym",
            storageBucket: "academia-capym.firebasestorage.app",

            appId: "1:261815103883:web:aa66d0b8d1b733195bff8e"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // (Se omiten los bancos de preguntas para no hacer el código inmanejable, he puesto un resumen, pero en tu código mantén las 40)
        // Por cuestiones de espacio en este formato, incluyo 3 de cada una para probar, tú puedes volver a pegar el bloque EXAMS de 40 preguntas sin problema.
        const EXAMS = {
            BASICO: [
                { q: "¿Cuál es el objetivo principal de la Portabilidad?", options: ["Conservar el número al cambiar de compañía.", "Obtener número nuevo.", "Baja de línea.", "Transferir saldo."], ans: 0 },
                { q: "¿Vigencia del NIP?", options: ["5 días naturales.", "24 horas.", "15 días.", "Ilimitada."], ans: 0 },
                { q: "¿Dígitos del ICC?", options: ["19 dígitos.", "15 dígitos.", "10 dígitos.", "13 dígitos."], ans: 0 },
                { q: "¿Qué significa FVC?", options: ["Fecha de Ventana de Cambio.", "Folio de Venta.", "Firma Valida.", "Fin de Venta."], ans: 0 },
                { q: "¿Quién regula la portabilidad?", options: ["El ABD.", "Movistar.", "El promotor.", "El cliente."], ans: 0 },
                { q: "Si ingresas CURP en Ónix, ¿qué paso evitas?", options: ["Fotos de identificación.", "Pedir NIP.", "Firmar.", "Escanear SIM."], ans: 0 },
                { q: "¿Número para pedir NIP?", options: ["051", "*611", "050", "*123"], ans: 0 },
                { q: "¿Qué pasa si es Persona Moral?", options: ["Rechazo ABD.", "Pasa normal.", "Tarda más.", "No requiere NIP."], ans: 0 },
                { q: "¿Horario ejecución portabilidades?", options: ["2:00 AM a 6:00 AM.", "Mediodía.", "Captura.", "10:00 PM."], ans: 0 },
                { q: "Motivo rechazo Back Office:", options: ["Fotos borrosas.", "Señal.", "NIP expirado.", "Chip dañado."], ans: 0 }
            ],
            EXPERTO: [
                { q: "Error Code 3059:", options: ["Proceso previo activo.", "NIP mal.", "SIM usada.", "Sin red."], ans: 0 },
                { q: "Horario Back Office:", options: ["Lunes a Sábado 9-17h.", "24/7.", "Lunes a Viernes 8-20h.", "Solo Domingos."], ans: 0 },
                { q: "Reinyección 'Order not exist':", options: ["Trámite nuevo.", "Reiniciar App.", "Nuevo NIP.", "Soporte 2L."], ans: 0 },
                { q: "¿Qué valida al Suscriptor Prepago?", options: ["SIM física y SMS.", "Factura.", "Identificación.", "IDPV."], ans: 0 },
                { q: "Equipo liberado se marca como:", options: ["BYOD.", "Externo.", "Smartphone.", "Genérico."], ans: 0 },
                { q: "'En espera de envío' es:", options: ["Revisión BO Prepago.", "NIP validado.", "Portado.", "Falta recarga."], ans: 0 },
                { q: "Sin llamadas post-FVC:", options: ["Escalar 2L.", "Esperar 48h.", "Reinyectar.", "Cargar $50."], ans: 0 },
                { q: "Llamadas al 051 permitidas:", options: ["Máximo 2.", "Ilimitadas.", "Una.", "Cero."], ans: 0 },
                { q: "Datos para 2L:", options: ["ID Prov, IDPV, DN, ICC.", "Nombre y CURP.", "Folio y Marca.", "Correo y Pass."], ans: 0 },
                { q: "Validación ABD es:", options: ["Verificando NIP.", "Revisando fotos.", "Ya es Movistar.", "Rechazo deuda."], ans: 0 },
                { q: "Descargar Ónix de:", options: ["asistentemovistar.com.mx", "Play Store.", "WhatsApp.", "Google."], ans: 0 },
                { q: "Documento NO válido:", options: ["Credencial trabajo.", "INE.", "Pasaporte.", "Cédula."], ans: 0 },
                { q: "ABD rechaza NIP mal:", options: ["Reinyección.", "Trámite nuevo.", "Soporte.", "Ajustes."], ans: 0 },
                { q: "Rechazo por Donador:", options: ["Compañía anterior bloqueó.", "Movistar rechazó.", "NIP mal.", "Sin señal."], ans: 0 },
                { q: "Tiempo respuesta ABD:", options: ["90 min hábiles.", "24 horas.", "Inmediata.", "48 horas."], ans: 0 }
            ],
            VENTAS: [
                { q: "¿Objetivo Venta Consultiva?", options: ["Indagar necesidad.", "Vender caro.", "Hablar mucho.", "Despachar."], ans: 0 },
                { q: "Característica vs Beneficio:", options: ["Técnica vs Utilidad.", "Precio vs Regalo.", "Son igual.", "Local vs Nacional."], ans: 0 },
                { q: "¿Preguntas Abiertas para?", options: ["Información detallada.", "Sí/No.", "Cerrar.", "Presupuesto."], ans: 0 },
                { q: "Ante 'Está caro':", options: ["Empatizar y dar valor.", "Ignorar.", "Enojo.", "Bajar precio."], ans: 0 },
                { q: "Pregunta '¿Qué necesito?':", options: ["Señal de Compra.", "Objeción.", "Duda.", "Distracción."], ans: 0 },
                { q: "Cierre de Ventas es:", options: ["Acción concreta trato.", "Dar bolsa.", "Llenar Ónix.", "Saludar."], ans: 0 },
                { q: "Up-Selling es:", options: ["Plan superior.", "Accesorios.", "Venta cruzada.", "Marca."], ans: 0 },
                { q: "Cross-Selling es:", options: ["Complementos.", "Otro chip.", "Porta.", "Sondeo."], ans: 0 },
                { q: "Escucha Activa es:", options: ["Contacto visual y parafrasear.", "Celular.", "Interrumpir.", "Mirar fuera."], ans: 0 },
                { q: "Romper el Hielo:", options: ["Generar empatía.", "Presupuesto.", "Specs.", "Reírse."], ans: 0 },
                { q: "Ante 'Lo voy a pensar':", options: ["Preguntar duda específica.", "Acaba mañana.", "Ignorar.", "Quitar equipo."], ans: 0 },
                { q: "Vender Valor es:", options: ["Mejorar vida cliente.", "Menor precio.", "Regalar.", "Historia."], ans: 0 },
                { q: "Post-Venta vital para:", options: ["Fidelizar y referidos.", "Cobrar.", "Protocolo.", "Nada."], ans: 0 },
                { q: "Brazo cruzado es:", options: ["Barrera e interés bajo.", "Profesional.", "Concentrado.", "Líder."], ans: 0 },
                { q: "Cliente molesto:", options: ["Calma y solución.", "Gritar.", "Ignorar.", "Seguridad."], ans: 0 }
            ]
        };

        const App = () => {
            const [view, setView] = useState("LOGIN");
            const [userRole, setUserRole] = useState("");
            const [userId, setUserId] = useState("");
            const [pass, setPass] = useState("");
            const [activeTab, setActiveTab] = useState("OPERACION");
            
            const [dataTEMM, setDataTEMM] = useState([]);
            const [dataINV, setDataINV] = useState([]);
            const [ranking, setRanking] = useState([]);
            const [history, setHistory] = useState([]);
            const [resources, setResources] = useState([]);
            
            // Nuevos Estados: Promotor del Mes y Portal
            const [candidates, setCandidates] = useState([]);
            const [quejas, setQuejas] = useState([]);
            const [vacaciones, setVacaciones] = useState([]);

            const [loading, setLoading] = useState(true);
            const [supFilter, setSupFilter] = useState("TODOS");
            const [cadFilter, setCadFilter] = useState("TODAS");

            const [subTabAcademia, setSubTabAcademia] = useState("EXAMENES");
            const [subTabPortal, setSubTabPortal] = useState("VACACIONES");
            
            // Estados Quiz y Formularios
            const [quizState, setQuizState] = useState('MENU');
            const [colaboradorName, setColaboradorName] = useState("");
            const [questions, setQuestions] = useState([]);
            const [curQ, setCurQ] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [timer, setTimer] = useState(180);
            const [curType, setCurType] = useState('');

            // Estado Vacaciones
            const [vacName, setVacName] = useState("");
            const [vacUser, setVacUser] = useState("");
            const [vacDate, setVacDate] = useState("");
            const [vacDays, setVacDays] = useState(1);
            
            // Estado Sugerencias
            const [sugText, setSugText] = useState("");

            useEffect(() => {
                const loader = document.getElementById('emergency-loader');
                if(loader) loader.style.display = 'none';
                
                auth.signInAnonymously().catch(e => console.log("Firebase Auth error"));

                const unsubOp = db.collection("operacion").onSnapshot(snap => {
                    snap.forEach(doc => {
                        if (doc.id === "temm") setDataTEMM(doc.data().list || []);
                        if (doc.id === "inv") setDataINV(doc.data().list || []);
                    });
                    setLoading(false);
                }, err => { setLoading(false); });

                const unsubRank = db.collection("ranking").orderBy("score", "desc").onSnapshot(s => setRanking(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubHist = db.collection("historicos").orderBy("fecha", "desc").onSnapshot(s => setHistory(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubRepo = db.collection("recurso").onSnapshot(s => setResources(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubCands = db.collection("promotor_mes").onSnapshot(s => setCandidates(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubQuejas = db.collection("quejas").orderBy("fecha", "desc").onSnapshot(s => setQuejas(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubVac = db.collection("vacaciones").orderBy("fecha", "desc").onSnapshot(s => setVacaciones(s.docs.map(d=>({id:d.id, ...d.data()}))));

                return () => { unsubOp(); unsubRank(); unsubHist(); unsubRepo(); unsubCands(); unsubQuejas(); unsubVac(); };
            }, []);

            useEffect(() => {
                let t = null;
                if (quizState === 'PLAY' && timer > 0) t = setInterval(() => setTimer(v => v - 1), 1000);
                else if (quizState === 'PLAY' && timer === 0) setQuizState('RESULT');
                return () => clearInterval(t);
            }, [quizState, timer]);

            // Fecha mínima para vacaciones (15 días a partir de hoy)
            const minVacationDate = useMemo(() => {
                const d = new Date();
                d.setDate(d.getDate() + 15);
                return d.toISOString().split('T')[0];
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const u = userId.trim().toUpperCase();
                if (u === "ADMIN" && pass === "2024") { setUserRole("ADMIN"); setView("APP"); }
                else if (pass === "Movistar1" && u.length >= 4) { setUserRole("PROMOTOR"); setView("APP"); }
                else { alert("Acceso Incorrecto."); }
            };

            const uploadFile = async (type, e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        const sheetKey = type === "temm" ? "seg diario" : "tiendas";
                        const wsName = wb.SheetNames.find(n => n.toLowerCase().includes(sheetKey));
                        if (!wsName) return alert(`Pestaña '${sheetKey}' no encontrada.`);
                        
                        const json = XLSX.utils.sheet_to_json(wb.Sheets[wsName], { header: "A", defval: "" });
                        let list = [];
                        if (type === "temm") {
                            list = json.filter(r => r["J"] && String(r["J"]).length > 3).map(r => ({
                                id: String(r["I"] || "").trim().replace(/^0+/, ''),
                                tienda: String(r["J"]).trim(), sup: String(r["B"]).trim(),
                                cad: String(r["L"]).toUpperCase().includes("EKT") ? "ELEKTRA" : (String(r["L"]).toUpperCase().includes("COPPEL") ? "COPPEL" : "SUBURBIA"),
                                altas: Math.round(r["Q"] || 0), cuota: Math.round(r["R"] || 0), gap: Math.round(r["S"] || 0)
                            }));
                        } else {
                            list = json.filter(r => r["I"] && String(r["I"]).length > 3).map(r => ({
                                id: String(r["I"] || "").trim().replace(/^0+/, ''),
                                mod: String(r["T"] || "").trim(), mar: String(r["U"] || "").trim(), q: parseInt(r["AG"] || 0)
                            }));
                        }
                        await db.collection("operacion").doc(type).set({ list });
                        alert("¡Sincronizado!");
                    } catch (error) { alert("Error procesando Excel."); }
                };
                reader.readAsBinaryString(file);
            };

            const startQuiz = (type) => {
                if (!colaboradorName.trim()) return alert("Nombre obligatorio.");
                setCurType(type);
                const shuffled = [...EXAMS[type]].sort(() => 0.5 - Math.random()).map(q => ({
                    ...q, options: q.options.map((o, i) => ({ t: o, isC: i === q.ans })).sort(() => 0.5 - Math.random())
                }));
                setQuestions(shuffled); setCurQ(0); setAnswers([]); setTimer(180); setQuizState('PLAY');
            };

            const handleAns = (isC) => {
                const nextA = [...answers, isC]; setAnswers(nextA);
                if (curQ + 1 < questions.length) setCurQ(v => v + 1);
                else setQuizState('RESULT');
            };

            const score = answers.filter(Boolean).length;
            const passed = score >= Math.ceil(questions.length * 0.8);
            const pts = (score * 5) + (passed ? timer : 0);

            const downloadCert = (name, module, date, supervisor) => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                    doc.setDrawColor(1, 157, 244); doc.setLineWidth(2); doc.rect(10, 10, 277, 190);
                    doc.setFont("helvetica", "bold"); doc.setFontSize(38); doc.setTextColor(11, 39, 57);
                    doc.text("CERTIFICACIÓN NACIONAL", 148, 50, { align: 'center' });
                    doc.setFontSize(16); doc.setFont("helvetica", "normal"); doc.text("HidalgoDash CAPYM otorga el presente a:", 148, 70, { align: 'center' });
                    doc.setFontSize(32); doc.setFont("helvetica", "bold"); doc.setTextColor(92, 182, 21); doc.text(name.toUpperCase(), 148, 95, { align: 'center' });
                    doc.setFontSize(14); doc.setTextColor(11, 39, 57); doc.setFont("helvetica", "normal"); doc.text(`Por acreditar el módulo: ${module}`, 148, 115, { align: 'center' });
                    doc.setFontSize(12); doc.text(`Fecha: ${date}`, 148, 130, { align: 'center' });
                    doc.line(50, 170, 120, 170); doc.setFontSize(10); doc.text(supervisor || "SUPERVISOR", 85, 176, { align: 'center' });
                    doc.line(177, 170, 247, 170); doc.text("C.P. ANGEL ROIZ", 212, 176, { align: 'center' }); doc.text("Líder Nacional", 212, 181, { align: 'center' });
                    doc.save(`Certificado_${name.replace(/\s/g, '_')}.pdf`);
                } catch(e) { alert("Error descargando el PDF."); }
            };

            useEffect(() => {
                if(quizState === 'RESULT' && passed) {
                    const name = colaboradorName.trim().toUpperCase();
                    const logId = userId.trim().toUpperCase();
                    const sName = userRole === "ADMIN" ? "ADMIN" : (dataTEMM.find(d => d.id === userId.trim().replace(/^0+/, ''))?.sup || "SUPERVISOR");
                    db.collection("historicos").add({ idpdv: logId, nombre: name, examen: curType, puntos: pts, sup: sName, fecha: firebase.firestore.FieldValue.serverTimestamp() });
                    db.collection("ranking").where("name", "==", name).get().then(snap => {
                        if (!snap.empty) snap.docs[0].ref.update({ score: snap.docs[0].data().score + pts, badges: Array.from(new Set([...(snap.docs[0].data().badges || []), curType])) });
                        else db.collection("ranking").add({ name, score: pts, badges: [curType] });
                    });
                }
            }, [quizState]);

            // Función Promotor del Mes - Subir Foto Base64
            const addCandidate = async (e) => {
