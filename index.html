    <script>
        window.onerror = function(msg, url, lineNo) {
            var loader = document.getElementById('emergency-loader');

                loader.innerHTML = `
                    <div style="padding:20px;text-align:center;color:#E63780;">
                        <h2 style="font-size:20px;font-weight:900;">⚠️ ERROR DE PEGADO</h2>
                        <p style="font-size:12px;margin-bottom:10px;">
                            Tu celular volvio a cortar el texto al pegar.
                        </p>
                        <div style="background:#fce4ec;padding:10px;font-family:monospace;font-size:10px;text-align:left;">
                            ${msg}<br>Linea: ${lineNo}
                        </div>
                        <button onclick="location.reload();" 
                                style="margin-top:20px;background:#019DF4;color:white;padding:10px;border-radius:10px;border:none;">
                            REINICIAR
                        </button>
                    </div>`;
            }
            return false;
        };
    </script>

                        const jsData = XLSX.utils.sheet_to_json(
                            wb.Sheets[wsName], { header: "A", defval: "" }
                        );
                        
                        let list = [];

                        if (type === "temm") {
                            list = jsData.filter(r => {
                                const j = String(r["J"] || "");
                                return j.length > 3 && !j.includes("PDV");
                            }).map(r => {
                                let cadena = "SUBURBIA";
                                let l = String(r["L"]).toUpperCase();
                                if (l.includes("EKT")) cadena = "ELEKTRA";
                                if (l.includes("COPPEL")) cadena = "COPPEL";

                                return {
                                    id: String(r["I"] || "").trim().replace(/^0+/, ''),
                                    tienda: String(r["J"]).trim(),
                                    sup: String(r["B"]).trim(),
                                    cad: cadena,
                                    altas: Math.round(Number(r["Q"]) || 0),
                                    cuota: Math.round(Number(r["R"]) || 0),
                                    gap: Math.round(Number(r["S"]) || 0)
                                };
                            });
                        } else {
                            list = jsData.filter(r => {
                                const i = String(r["I"] || "");
                                return i.length > 3;
                            }).map(r => ({
                                id: String(r["I"] || "").trim().replace(/^0+/, ''),
                                mod: String(r["T"] || "").trim(),
                                mar: String(r["U"] || "").trim(),
                                q: parseInt(Number(r["AG"]) || 0)
                            }));
                        }
                        
                        await db.collection("operacion_v2").doc(type).set({ list });
                        alert("Sincronizado a Nivel Nacional!");

                    } catch (error) { 
                        alert("Error subiendo datos."); 
                    }
                };
                
                // Este es el renglon que se cortaba en tu celular
                reader.readAsBinaryString(file);
            };

            const addCandidate = async (e) => {
                if(!db) return;
                const file = e.target.files[0]; 
                if (!file) return;
                
                const name = prompt("Nombre del Nominado:"); 
                if(!name) return;
                
                if(candidates.length >= 4) {
                    alert("Maximo 4 nominados.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 200;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH; 
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const b64 = canvas.toDataURL('image/jpeg', 0.5);
                        
                        try {
                            await db.collection("promotor_mes").add({ 
                                nombre: name.toUpperCase(), 
                                foto: b64, 
                                votos: [] 
                            });
                            alert("Candidato agregado.");
                        } catch(err) { 
                            alert("Error guardando."); 
                        }
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            };

            const voteCandidate = async (candidateId) => {

                const logId = userId.trim().toUpperCase();
                let yaVoto = false;
                
                candidates.forEach(c => { 
                    if(c.votos && c.votos.includes(logId)) yaVoto = true; 
                });
                
                if(yaVoto) {
                    alert("Solo 1 voto por tienda.");
                    return;
                }

                try {
                    const candRef = db.collection("promotor_mes").doc(candidateId);
                    const candDoc = await candRef.get();
                    if(candDoc.exists) {
                        const currentVotes = candDoc.data().votos || [];
                        const newVotes = [...currentVotes, logId];
                        await candRef.update({ votos: newVotes });

                                                    <a href={r.lnk} target="_blank" key={i} className="block bg-white p-5 rounded-[1.5rem] shadow-sm border flex justify-between items-center">
                                                        <span className="font-bold text-[10px] uppercase text-movistar-dark">{r.tit}</span>
                                                        <span className="bg-blue-50 p-2 rounded-lg text-movistar-blue">⬇️</span>
                                                    </a>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'EL_MES' && (
                            <div className="space-y-6 animate-pop">
                                <div className="bg-movistar-dark p-6 rounded-[2.5rem] text-white shadow-xl flex justify-between items-center">
                                    <div>
                                        <h2 className="font-black text-lg italic uppercase tracking-tighter">EL MEJOR</h2>
                                        <p className="text-[9px] font-bold text-movistar-blue uppercase mt-1">Votacion Mensual</p>
                                    </div>
                                    {userRole === "ADMIN" && candidates.length < 4 && 
                                        <label className="bg-movistar-blue p-3 rounded-xl font-black text-[9px] shadow-md cursor-pointer">
                                            + FOTO
                                            <input type="file" accept="image/*" className="hidden" onChange={addCandidate}/>
                                        </label>
                                    }
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {candidates.length === 0 ? <p className="col-span-2 text-center text-gray-400 font-bold py-10 text-xs">Sin candidatos.</p> : 
                                    candidates.map(c => (
                                        <div key={c.id} className="bg-white p-4 rounded-[2rem] shadow-lg border flex flex-col items-center">
                                            <div className="w-24 h-24 rounded-full overflow-hidden mb-4 border-4 border-movistar-blue">
                                                <img src={c.foto} alt="candidato" className="w-full h-full object-cover"/>
                                            </div>
                                            <h4 className="font-black text-[11px] text-center uppercase leading-tight mb-2 h-8">{c.nombre}</h4>
                                            <div className="bg-blue-50 w-full text-center py-2 rounded-xl mb-3">
                                                <span className="font-black text-movistar-blue text-xl">{c.votos ? c.votos.length : 0}</span>
                                            </div>
                                            {userRole === "PROMOTOR" && 
                                                <button onClick={()=>voteCandidate(c.id)} className="w-full bg-movistar-blue text-white py-3 rounded-xl font-black text-[10px] active:scale-95">VOTAR ⭐</button>
                                            }
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'PORTAL' && (
                            <div className="space-y-6 animate-pop">
                                <div className="flex bg-gray-200 p-1 rounded-2xl">
                                    <button onClick={()=>setSubTabPortal("VACACIONES")} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${subTabPortal==="VACACIONES"?'bg-white shadow text-movistar-blue':'text-gray-500'}`}>VACACIONES</button>
                                    <button onClick={()=>setSubTabPortal("QUEJAS")} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${subTabPortal==="QUEJAS"?'bg-white shadow text-movistar-blue':'text-gray-500'}`}>SUGERENCIAS</button>
                                </div>

                                {subTabPortal === "VACACIONES" ? (
                                    userRole === "PROMOTOR" ? (
                                        <div className="bg-white p-6 rounded-[2rem] shadow-xl border">
                                            <h2 className="text-lg font-black mb-4 uppercase text-movistar-dark">Dias Libres</h2>
                                            <form onSubmit={submitVacaciones} className="space-y-4">
                                                <input type="text" placeholder="Nombre" required value={vacName} onChange={e=>setVacName(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none focus:ring-2 focus:ring-movistar-blue"/>
                                                <input type="text" placeholder="Usuario FW" required value={vacUser} onChange={e=>setVacUser(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none focus:ring-2 focus:ring-movistar-blue"/>
                                                <div>
                                                    <label className="text-[9px] font-black text-gray-400 ml-2 uppercase">Inicio (Min 15 dias)</label>
                                                    <input type="date" required min={minVacationDate} value={vacDate} onChange={e=>setVacDate(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none mt-1"/>
                                                </div>
                                                <div>
                                                    <label className="text-[9px] font-black text-gray-400 ml-2 uppercase">Dias a pedir</label>
                                                    <input type="number" min="1" max="14" required value={vacDays} onChange={e=>setVacDays(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none mt-1"/>
                                                </div>
                                                <button type="submit" className="w-full bg-movistar-blue text-white p-4 rounded-xl font-black shadow-lg text-[10px] active:scale-95">ENVIAR</button>
                                            </form>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            <h2 className="text-sm font-black text-movistar-dark uppercase ml-2">Solicitudes</h2>
                                            {vacaciones.map(v => (
                                                <div key={v.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm border-l-4 border-movistar-blue">
                                                    <div className="flex justify-between">
                                                        <span className="text-[9px] font-black text-movistar-blue">{v.idpdv}</span>
                                                        <span className="text-[8px] font-bold text-gray-400">{v.fecha?.toDate().toLocaleDateString()}</span>
                                                    </div>
                                                    <h4 className="font-black text-xs uppercase my-1">{v.nombre}</h4>
                                                    <p className="text-[10px] font-bold text-gray-500">
                                                        Pide <span className="text-movistar-dark font-black">{v.diasSolicitados} dias</span> desde <span className="text-movistar-dark font-black">{v.fechaDeseada}</span>
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    )
                                ) : (
                                    userRole === "PROMOTOR" ? (
                                        <div className="bg-white p-6 rounded-[2rem] shadow-xl border">
                                            <h2 className="text-lg font-black mb-2 uppercase text-movistar-dark">Buzon Operativo</h2>
                                            <form onSubmit={submitSugerencia} className="space-y-4 mt-4">
                                                <textarea required placeholder="Sugerencia..." rows="5" value={sugText} onChange={e=>setSugText(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none focus:ring-2 focus:ring-movistar-blue resize-none"></textarea>
                                                <button type="submit" className="w-full bg-movistar-dark text-white p-4 rounded-xl font-black shadow-lg text-[10px]">ENVIAR</button>
                                            </form>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            <h2 className="text-sm font-black text-movistar-dark uppercase ml-2">Buzon de Mensajes</h2>
                                            {quejas.map(q => (
                                                <div key={q.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm border-l-4 border-movistar-red">
                                                    <div className="flex justify-between mb-2">
                                                        <span className="text-[9px] font-black text-movistar-red">ID: {q.idpdv}</span>
                                                        <span className="text-[8px] font-bold text-gray-400">{q.fecha?.toDate().toLocaleDateString()}</span>
                                                    </div>
                                                    <p className="text-xs font-bold text-gray-600 italic">"{q.texto}"</p>
                                                </div>
                                            ))}
                                        </div>
                                    )
                                )}
                            </div>
                        )}

                        {activeTab === 'RANKING' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border animate-pop">
                                <div className="bg-movistar-dark p-6 text-white flex justify-between items-center"><h2 className="font-black text-base italic uppercase tracking-tighter">Lideres</h2><span className="text-[8px] font-black bg-movistar-green px-3 py-1 rounded-full uppercase">Vivo</span></div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-gray-50 border-b">
                                            <tr className="text-[9px] font-black text-gray-400 uppercase tracking-widest"><th className="p-5 text-center">#</th><th className="p-5">NOMBRE</th><th className="p-5 text-right">SCORE</th></tr>
                                        </thead>
                                        <tbody>
                                            {Array.isArray(ranking) && ranking.map((u, i) => (
                                                <tr key={u.id} className="border-b hover:bg-gray-50">
                                                    <td className="p-5 text-center font-black text-gray-200">#{i+1}</td>
                                                    <td className="p-5 font-black text-[10px] uppercase text-movistar-dark leading-none">{u.name}</td>
                                                    <td className="p-5 text-right font-black text-movistar-blue tabular-nums">{u.score}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'HISTORICOS' && (
                            <div className="space-y-4 animate-pop">
                                <div className="bg-movistar-dark p-6 rounded-[2rem] text-white shadow-lg"><h2 className="font-black text-base italic uppercase tracking-tighter">HISTORIAL LOG</h2><p className="text-[9px] font-black text-movistar-blue uppercase mt-1">Nacional Sincronizado</p></div>
                                {Array.isArray(history) && history.filter(h => userRole==="ADMIN" || h?.idpdv===userId.toUpperCase()).map(h => (
                                    <div key={h.id} className="bg-white p-5 rounded-[2rem] shadow-md border-l-8 border-movistar-green flex justify-between items-center">
                                        <div className="flex-1 mr-2">
                                            <p className="text-[8px] font-black text-movistar-blue uppercase mb-1 bg-blue-50 inline-block px-2 rounded tracking-tighter">{h.examen}</p>
                                            <h4 className="font-black text-[11px] uppercase leading-tight text-movistar-dark mb-1">{h.nombre}</h4>
                                            <p className="text-[8px] font-bold text-gray-400 uppercase tracking-tighter leading-none">ID: {h.idpdv} • {h.fecha?.toDate().toLocaleDateString('es-MX')}</p>
                                        </div>
                                        <div className="text-right flex flex-col items-end">
                                            <p className="text-2xl font-black text-movistar-dark leading-none">{h.puntos}</p>
                                            <p className="text-[8px] font-black text-gray-300 uppercase tracking-widest mt-1">PTS</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
