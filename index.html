    <script>
        window.onerror = function(msg, url, lineNo) {
            if (typeof msg === 'string' && (msg.includes('auth/') || msg.includes('configuration-not-found'))) {
                console.warn("Ignorado error de Auth de Firebase:", msg);
                return true; 
            }
            var loader = document.getElementById('emergency-loader');
            if (loader) {
                loader.innerHTML = `
                    <div style="padding:20px;text-align:center;color:#E63780;">
                        <h2 style="font-size:20px;font-weight:900;">⚠️ ERROR</h2>
                        <div style="background:#fce4ec;padding:10px;font-family:monospace;font-size:10px;text-align:left;">
                            ${msg}<br>Linea: ${lineNo}
                        </div>
                        <button onclick="location.reload();" style="margin-top:20px;background:#019DF4;color:white;padding:10px;border-radius:10px;border:none;">REINICIAR</button>
                    </div>`;
            }
            return false;
        };

        window.onunhandledrejection = function(event) {
            if (event.reason && event.reason.message && (event.reason.message.includes('auth/') || event.reason.message.includes('configuration-not-found'))) {
                console.warn("Ignorado Rejection de Auth:", event.reason.message);
                event.preventDefault();
            }
        };
    </script>

                                                            {renderExamBtn('BASICO', '👉 PORTABILIDAD BÁSICA (10 Q)', 'bg-movistar-blue text-white')}
                                                            {renderExamBtn('COMISIONES', '👉 ESQUEMA COMISIONES (10 Q)', 'bg-gradient-to-r from-orange-400 to-red-500 text-white')}
                                                            {renderExamBtn('SUELDO_FIELDWY', '👉 SUELDO BASE Y APP FIELDWY (10 Q)', 'bg-indigo-500 text-white')}
                                                            {renderExamBtn('VENTAS', '💼 VENTA CONSULTIVA (10 Q)', 'bg-movistar-green text-white')}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <h4 className="font-black text-[10px] text-movistar-dark mb-2 uppercase border-b border-gray-200 pb-1">TODOS LOS BÁSICOS</h4>
                                                        <div className="grid gap-2">
                                                            {renderExamBtn('BASICO', '🔄 REPASO: PORTABILIDAD BÁSICA', 'bg-gray-100 text-movistar-dark border-2 border-movistar-blue')}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <h4 className="font-black text-[10px] text-movistar-dark mb-2 uppercase border-b border-gray-200 pb-1">AVANZADOS</h4>
                                                        <div className="grid gap-2">
                                                            {renderExamBtn('EXPERTO', '🔥 PORTABILIDAD EXPERTA (10 Q)', 'bg-movistar-dark text-white')}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : quizState === 'PLAY' ? (
                                        <div className="bg-white p-8 rounded-[2rem] shadow-xl border">
                                            <div className="flex justify-between mb-8 border-b pb-4">
                                                <span className="text-[10px] font-black text-gray-300">P. {curQ+1}/{questions.length}</span>
                                                <div className={`font-black text-2xl ${timer<30?'text-red-500':''}`}>{Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}</div>
                                            </div>
                                            <h3 className="text-sm font-bold mb-10 leading-relaxed text-movistar-dark">{questions[curQ]?.q}</h3>
                                            <div className="grid gap-4">
                                                {questions[curQ]?.options.map((o,i) => (
                                                    <button key={i} onClick={()=>handleAns(o.isC)} className="text-left p-4 rounded-2xl border-2 border-gray-100 font-bold text-[11px] leading-tight active:bg-blue-50 hover:border-movistar-blue transition-colors">{o.t}</button>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="bg-white p-10 rounded-[2rem] shadow-2xl text-center">
                                            <div className={`w-24 h-24 rounded-full border-[10px] mx-auto flex items-center justify-center mb-6 font-black text-4xl ${passed?'border-green-500 text-green-500':'border-red-500 text-red-500'}`}>{score}</div>
                                            <h2 className="text-2xl font-black mb-6 italic uppercase">{passed ? "Certificado" : "Reprobado"}</h2>
                                            {passed && <button onClick={() => downloadCert(colaboradorName, curType, new Date().toLocaleDateString())} className="mb-6 w-full bg-movistar-green text-white p-5 rounded-2xl font-black uppercase text-[10px] shadow-lg active:scale-95 transition-transform">Descargar PDF 📄</button>}
                                            <button onClick={() => setQuizState('MENU')} className="bg-movistar-dark text-white w-full py-5 rounded-2xl font-black text-xs active:scale-95 transition-transform">Terminar</button>
                                        </div>
                                    )
                                ) : (
                                    <div className="space-y-4">
                                        <div className="bg-movistar-dark p-6 rounded-[2rem] text-white flex justify-between items-center shadow-xl">
                                            <div>
                                                <h2 className="font-black text-lg italic uppercase">REPOSITORIO</h2>
                                                <p className="text-[9px] font-bold text-gray-400 mt-1">Accede y descarga los manuales, comunicados y documentos oficiales de CAPYM.</p>
                                            </div>
                                            {userRole === "ADMIN" && <button onClick={async ()=>{const cat = prompt("Categoría:"); const tit = prompt("Nombre:"); const lnk = prompt("Link:"); if(cat && tit && lnk && db) await getDbPath("recurso").add({ cat: cat.toUpperCase(), tit, lnk }); }} className="bg-movistar-blue p-3 rounded-xl font-black text-[9px] shadow-md active:scale-90">+ ADD</button>}
                                        </div>
                                        {["NUEVO INGRESO", "COMISIONES", "ESPECIALES", "VARIOS"].map(cat => (
                                            <div key={cat} className="space-y-2">
                                                <p className="text-[10px] font-black text-movistar-blue ml-4 uppercase tracking-widest">{cat}</p>
                                                {STATIC_DOCS.filter(s => s.cat === cat).map((r,i) => (
                                                    <a href="javascript:void(0)" onClick={() => alert("Para descargar este documento oficial de CAPYM, solicítalo en tu grupo oficial de WhatsApp.")} key={`static-${i}`} className="block bg-white p-5 rounded-[1.5rem] shadow-sm border flex justify-between items-center active:bg-gray-50 transition-colors">
                                                        <span className="font-bold text-[10px] uppercase text-movistar-dark w-4/5">{r.tit}</span>
                                                        <span className="bg-blue-50 p-2 rounded-lg text-movistar-blue text-[8px] font-black">PDF</span>
                                                    </a>
                                                ))}
                                                {Array.isArray(resources) && resources.filter(r=>r?.cat===cat).map((r,i) => (
                                                    <div key={`dyn-${i}`} className="bg-white p-5 rounded-[1.5rem] shadow-sm border flex justify-between items-center relative">
                                                        {userRole === "ADMIN" && <button onClick={() => deleteDoc("recurso", r.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-500 rounded-full w-6 h-6 flex items-center justify-center font-bold text-[10px] shadow-sm">X</button>}
                                                        <a href={r.lnk} target="_blank" className="flex justify-between items-center w-full">
                                                            <span className="font-bold text-[10px] uppercase text-movistar-dark w-4/5">{r.tit}</span>
                                                            <span className="bg-blue-50 p-2 rounded-lg text-movistar-blue text-[10px]">⬇️</span>
                                                        </a>
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
