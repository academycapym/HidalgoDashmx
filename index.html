<body>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7jT_0uOIW17wrkqqar97WZdc8qvuoKGI",
            authDomain: "academia-capym.firebaseapp.com",
            projectId: "academia-capym",
            storageBucket: "academia-capym.firebasestorage.app",
            messagingSenderId: "261815103883",
            appId: "1:261815103883:web:aa66d0b8d1b733195bff8e"
        };
        
        let db = null;
        let auth = null;

        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (error) {
            console.error("Firebase init failed:", error);
            alert("Advertencia: No se pudo conectar a la base de datos.");
        }

        // --- BANCOS DE PREGUNTAS (Resumido para V12, puedes volver a pegar las 40 después si funciona) ---
        const EXAMS = {
            BASICO: [
                { q: "¿Cuál es el objetivo principal de la Portabilidad?", options: ["Conservar el número al cambiar de compañía.", "Obtener número nuevo.", "Baja de línea.", "Transferir saldo."], ans: 0 },
                { q: "¿Vigencia del NIP?", options: ["5 días naturales.", "24 horas.", "15 días.", "Ilimitada."], ans: 0 },
                { q: "¿Dígitos del ICC?", options: ["19 dígitos.", "15 dígitos.", "10 dígitos.", "13 dígitos."], ans: 0 }
            ],
            EXPERTO: [
                { q: "Error Code 3059:", options: ["Proceso previo activo.", "NIP mal.", "SIM usada.", "Sin red."], ans: 0 },
                { q: "Horario Back Office:", options: ["Lunes a Sábado 9-17h.", "24/7.", "Lunes a Viernes 8-20h.", "Solo Domingos."], ans: 0 },
                { q: "Reinyección 'Order not exist':", options: ["Trámite nuevo.", "Reiniciar App.", "Nuevo NIP.", "Soporte 2L."], ans: 0 }
            ],
            VENTAS: [
                { q: "¿Objetivo Venta Consultiva?", options: ["Indagar necesidad.", "Vender caro.", "Hablar mucho.", "Despachar."], ans: 0 },
                { q: "Característica vs Beneficio:", options: ["Técnica vs Utilidad.", "Precio vs Regalo.", "Son igual.", "Local vs Nacional."], ans: 0 },
                { q: "¿Preguntas Abiertas para?", options: ["Información detallada.", "Sí/No.", "Cerrar.", "Presupuesto."], ans: 0 }
            ]
        };

        const App = () => {
            const [view, setView] = useState("LOGIN");
            const [userRole, setUserRole] = useState("");
            const [userId, setUserId] = useState("");
            const [pass, setPass] = useState("");
            const [activeTab, setActiveTab] = useState("OPERACION");
            
            const [dataTEMM, setDataTEMM] = useState([]);
            const [dataINV, setDataINV] = useState([]);
            const [ranking, setRanking] = useState([]);
            const [history, setHistory] = useState([]);
            const [resources, setResources] = useState([]);
            const [candidates, setCandidates] = useState([]);
            const [quejas, setQuejas] = useState([]);
            const [vacaciones, setVacaciones] = useState([]);

            const [loading, setLoading] = useState(true);
            const [firebaseReady, setFirebaseReady] = useState(false);

            const [supFilter, setSupFilter] = useState("TODOS");
            const [cadFilter, setCadFilter] = useState("TODAS");

            const [subTabAcademia, setSubTabAcademia] = useState("EXAMENES");
            const [subTabPortal, setSubTabPortal] = useState("VACACIONES");
            
            const [quizState, setQuizState] = useState('MENU');
            const [colaboradorName, setColaboradorName] = useState("");
            const [questions, setQuestions] = useState([]);
            const [curQ, setCurQ] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [timer, setTimer] = useState(180);
            const [curType, setCurType] = useState('');

            const [vacName, setVacName] = useState("");
            const [vacUser, setVacUser] = useState("");
            const [vacDate, setVacDate] = useState("");
            const [vacDays, setVacDays] = useState(1);
            const [sugText, setSugText] = useState("");

            useEffect(() => {
                // Quitar loader inicial obligatoriamente
                const loader = document.getElementById('emergency-loader');
                if(loader) loader.style.display = 'none';
                
                if (!db || !auth) {
                    setLoading(false);
                    return;
                }

                auth.signInAnonymously().then(() => {
                    setFirebaseReady(true);
                }).catch(e => {
                    console.error("Auth Error", e);
                    // Si falla el auth, de todos modos intentamos leer (depende de reglas)
                    setFirebaseReady(true);
                });
            }, []);

            useEffect(() => {
                if (!firebaseReady || !db) return;

                const unsubs = [];
                try {
                    unsubs.push(db.collection("operacion").onSnapshot(snap => {
                        snap.forEach(doc => {
                            if (doc.id === "temm") setDataTEMM(doc.data().list || []);
                            if (doc.id === "inv") setDataINV(doc.data().list || []);
                        });
                        setLoading(false);
                    }, err => { console.error("Data error", err); setLoading(false); }));

                    unsubs.push(db.collection("ranking").orderBy("score", "desc").onSnapshot(s => setRanking(s.docs.map(d=>({id:d.id, ...d.data()}))), e => console.error(e)));
                    unsubs.push(db.collection("historicos").orderBy("fecha", "desc").onSnapshot(s => setHistory(s.docs.map(d=>({id:d.id, ...d.data()}))), e => console.error(e)));
                    unsubs.push(db.collection("recurso").onSnapshot(s => setResources(s.docs.map(d=>({id:d.id, ...d.data()}))), e => console.error(e)));
                    unsubs.push(db.collection("promotor_mes").onSnapshot(s => setCandidates(s.docs.map(d=>({id:d.id, ...d.data()}))), e => console.error(e)));
                    unsubs.push(db.collection("quejas").orderBy("fecha", "desc").onSnapshot(s => setQuejas(s.docs.map(d=>({id:d.id, ...d.data()}))), e => console.error(e)));
                    unsubs.push(db.collection("vacaciones").orderBy("fecha", "desc").onSnapshot(s => setVacaciones(s.docs.map(d=>({id:d.id, ...d.data()}))), e => console.error(e)));
                } catch (error) {
                    console.error("Snapshot setup error", error);
                    setLoading(false);
                }

                return () => unsubs.forEach(unsub => { if(unsub) unsub(); });
            }, [firebaseReady]);

            useEffect(() => {
                let t = null;
                if (quizState === 'PLAY' && timer > 0) t = setInterval(() => setTimer(v => v - 1), 1000);
                else if (quizState === 'PLAY' && timer === 0) setQuizState('RESULT');
                return () => clearInterval(t);
            }, [quizState, timer]);

            const minVacationDate = useMemo(() => {
                const d = new Date(); d.setDate(d.getDate() + 15);
                return d.toISOString().split('T')[0];
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const u = userId.trim().toUpperCase();
                if (u === "ADMIN" && pass === "2024") { setUserRole("ADMIN"); setView("APP"); }
                else if (pass === "Movistar1" && u.length >= 4) { setUserRole("PROMOTOR"); setView("APP"); }
                else { alert("Acceso Incorrecto."); }
            };

            const uploadFile = async (type, e) => {
                if(!db) return alert("No hay conexión a la base de datos.");
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        const sheetKey = type === "temm" ? "seg diario" : "tiendas";
                        const wsName = wb.SheetNames.find(n => n.toLowerCase().includes(sheetKey));
                        if (!wsName) return alert(`Pestaña '${sheetKey}' no encontrada.`);
                        const json = XLSX.utils.sheet_to_json(wb.Sheets[wsName], { header: "A", defval: "" });
                        let list = [];
                        if (type === "temm") {
                            list = json.filter(r => r["J"] && String(r["J"]).length > 3 && !String(r["J"]).includes("PDV")).map(r => ({
                                id: String(r["I"] || "").trim().replace(/^0+/, ''),
                                tienda: String(r["J"]).trim(), sup: String(r["B"]).trim(),
                                cad: String(r["L"]).toUpperCase().includes("EKT") ? "ELEKTRA" : (String(r["L"]).toUpperCase().includes("COPPEL") ? "COPPEL" : "SUBURBIA"),
                                altas: Math.round(r["Q"] || 0), cuota: Math.round(r["R"] || 0), gap: Math.round(r["S"] || 0)
                            }));
                        } else {
                            list = json.filter(r => r["I"] && String(r["I"]).length > 3).map(r => ({
                                id: String(r["I"] || "").trim().replace(/^0+/, ''),
                                mod: String(r["T"] || "").trim(), mar: String(r["U"] || "").trim(), q: parseInt(r["AG"] || 0)
                            }));
                        }
                        await db.collection("operacion").doc(type).set({ list });
                        alert("¡Sincronizado!");
                    } catch (error) { alert("Error procesando Excel o conectando a BD."); }
                };
                reader.readAsBinaryString(file);
            };

            const addCandidate = async (e) => {
                if(!db) return;
                const file = e.target.files[0]; if (!file) return;
                const name = prompt("Nombre del Nominado:"); if(!name) return;
                if(candidates.length >= 4) return alert("Solo 4 candidatos.");

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 200;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const base64small = canvas.toDataURL('image/jpeg', 0.5);
                        try {
                            await db.collection("promotor_mes").add({ nombre: name.toUpperCase(), foto: base64small, votos: [] });
                            alert("Candidato agregado.");
                        } catch(err) { alert("Error guardando candidato."); }
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            };

            const voteCandidate = async (candidateId) => {
                if(userRole === "ADMIN") return alert("Admin no vota.");
                if(!db) return;
                const logId = userId.trim().toUpperCase();
                let yaVoto = false;
                candidates.forEach(c => { if(c.votos && c.votos.includes(logId)) yaVoto = true; });
                if(yaVoto) return alert("Ya votaste.");

                try {
                    const candRef = db.collection("promotor_mes").doc(candidateId);
                    const candDoc = await candRef.get();
                    if(candDoc.exists) {
                        const currentVotes = candDoc.data().votos || [];
                        await candRef.update({ votos: [...currentVotes, logId] });
                        alert("Voto registrado.");
                    }
                } catch (e) { alert("Error al votar."); }
            };

            const submitSugerencia = async (e) => {
                e.preventDefault();
                if(!sugText.trim() || !db) return;
                try {
                    await db.collection("quejas").add({ idpdv: userId.toUpperCase(), texto: sugText, fecha: firebase.firestore.FieldValue.serverTimestamp() });
                    setSugText(""); alert("Enviado.");
                } catch(e) { alert("Error enviando sugerencia."); }
            };

            const submitVacaciones = async (e) => {
                e.preventDefault();
                if(!db) return;
                try {
                    await db.collection("vacaciones").add({ 
                        idpdv: userId.toUpperCase(), nombre: vacName.toUpperCase(), usuarioFw: vacUser.toUpperCase(), 
                        fechaDeseada: vacDate, diasSolicitados: vacDays, estatus: 'Pendiente',
                        fecha: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                    setVacName(""); setVacUser(""); setVacDate(""); setVacDays(1);
                    alert("Solicitud enviada.");
                } catch(e) { alert("Error solicitando vacaciones."); }
            };

            const startQuiz = (type) => {
                if (!colaboradorName.trim()) return alert("Nombre obligatorio.");
                setCurType(type);
                const shuffled = [...EXAMS[type]].sort(() => 0.5 - Math.random()).map(q => ({
                    ...q, options: q.options.map((o, i) => ({ t: o, isC: i === q.ans })).sort(() => 0.5 - Math.random())
                }));
                setQuestions(shuffled); setCurQ(0); setAnswers([]); setTimer(180); setQuizState('PLAY');
            };

            const handleAns = (isC) => {
                const nextA = [...answers, isC]; setAnswers(nextA);
                if (curQ + 1 < questions.length) setCurQ(v => v + 1);
                else setQuizState('RESULT');
            };

            const score = answers.filter(Boolean).length;
            const passed = score >= Math.ceil(questions.length * 0.8);
            const pts = (score * 5) + (passed ? timer : 0);

            const downloadCert = (name, module, date, supervisor) => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                    doc.setDrawColor(1, 157, 244); doc.setLineWidth(2); doc.rect(10, 10, 277, 190);
                    doc.setFont("helvetica", "bold"); doc.setFontSize(38); doc.setTextColor(11, 39, 57);
                    doc.text("CERTIFICADO NACIONAL", 148, 50, { align: 'center' });
                    doc.setFontSize(16); doc.setFont("helvetica", "normal"); doc.text("HidalgoDash CAPYM otorga el presente a:", 148, 70, { align: 'center' });
                    doc.setFontSize(32); doc.setFont("helvetica", "bold"); doc.setTextColor(92, 182, 21); doc.text(name.toUpperCase(), 148, 95, { align: 'center' });
                    doc.setFontSize(14); doc.setTextColor(11, 39, 57); doc.setFont("helvetica", "normal"); doc.text(`Por acreditar el módulo: ${module}`, 148, 120, { align: 'center' });
                    doc.setFontSize(12); doc.text(`Fecha: ${date}`, 148, 140, { align: 'center' });
                    doc.line(50, 175, 120, 175); doc.setFontSize(10); doc.text(supervisor || "SUPERVISOR", 85, 182, { align: 'center' });
                    doc.line(177, 175, 247, 175); doc.text("C.P. ANGEL ROIZ", 212, 182, { align: 'center' });
                    doc.save(`Certificado_${name.replace(/\s/g, '_')}.pdf`);
                } catch(e) { alert("Error descargando el PDF."); }
            };

            useEffect(() => {
                if(quizState === 'RESULT' && passed && db) {
                    const name = colaboradorName.trim().toUpperCase();
                    const logId = userId.trim().toUpperCase();
                    const sName = userRole === "ADMIN" ? "ADMIN" : (dataTEMM.find(d => d.id === userId.trim().replace(/^0+/, ''))?.sup || "SUPERVISOR");
                    
                    try {
                        db.collection("historicos").add({ idpdv: logId, nomb
