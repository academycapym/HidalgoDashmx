    <script>
        window.onerror = function(msg, url, lineNo) {
            var loader = document.getElementById('emergency-loader');
            if (loader) {
                loader.innerHTML = `
                    <div style="padding:20px;text-align:center;color:#E63780;">
                        <h2 style="font-size:20px;font-weight:900;">⚠️ ERROR</h2>
                        <div style="background:#fce4ec;padding:10px;font-family:monospace;font-size:10px;text-align:left;">
                            ${msg}<br>Linea: ${lineNo}
                        </div>
                        <button onclick="location.reload();" style="margin-top:20px;background:#019DF4;color:white;padding:10px;border-radius:10px;border:none;">REINICIAR</button>
                    </div>`;
            }
            return false;
        };
    </script>

                                                    </div>
                                                    <div className="bar-col bg-movistar-green" style={{height: `${Math.max((encStats.qMot.b/encStats.total)*100, 5)}%`}}>
                                                        <span className="absolute -top-4 w-full text-center text-[8px] font-black">{encStats.qMot.b}</span>
                                                        <span className="bar-label">Descanso</span>
                                                    </div>
                                                    <div className="bar-col bg-movistar-dark" style={{height: `${Math.max((encStats.qMot.c/encStats.total)*100, 5)}%`}}>
                                                        <span className="absolute -top-4 w-full text-center text-[8px] font-black">{encStats.qMot.c}</span>
                                                        <span className="bar-label">Visita Agencia</span>
                                                    </div>
                                                    <div className="bar-col bg-orange-400" style={{height: `${Math.max((encStats.qMot.d/encStats.total)*100, 5)}%`}}>
                                                        <span className="absolute -top-4 w-full text-center text-[8px] font-black">{encStats.qMot.d}</span>
                                                        <span className="bar-label">Reconocimiento</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : encuestaActiva ? (
                                            <form onSubmit={submitEncuesta} className="bg-white p-6 rounded-[2rem] border shadow-sm space-y-6">
                                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-6">
                                                    <p className="text-[10px] font-bold text-movistar-dark leading-relaxed">
                                                        Por favor evalúa los siguientes {ENCUESTA_PREGUNTAS.length} aspectos de tu experiencia en CAPYM. <br/>
                                                        <strong>Escala: 1 (Muy malo / Nada de acuerdo) al 5 (Excelente / Totalmente de acuerdo).</strong>
                                                    </p>
                                                </div>

                                                {ENCUESTA_PREGUNTAS.map((pregunta, index) => (
                                                    <div key={index} className="border-b pb-4 border-gray-100">
                                                        <label className="text-[10px] font-black text-movistar-dark uppercase block mb-3">{index + 1}. {pregunta}</label>
                                                        <div className="flex gap-2">
                                                            {[1, 2, 3, 4, 5].map(val => (
                                                                <label key={val} className={`flex-1 text-center py-2 rounded-xl cursor-pointer border font-black transition-colors ${encRespuestas[index] === val ? 'bg-movistar-blue text-white border-movistar-blue shadow-md' : 'bg-gray-50 text-gray-400 border-gray-200'}`}>
                                                                    <input type="radio" name={`q_${index}`} value={val} checked={encRespuestas[index] === val} onChange={(e) => updateEncRespuesta(index, e.target.value)} className="hidden"/>
                                                                    {val}
                                                                </label>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}

                                                <div className="pt-4">
                                                    <label className="text-[10px] font-black text-movistar-dark uppercase block mb-4">{ENCUESTA_PREGUNTAS.length + 1}. ¿Qué te gustaría que se hiciera como motivación extra?</label>
                                                    <div className="space-y-3">
                                                        <label className={`flex items-center gap-3 p-4 rounded-xl cursor-pointer transition-colors border ${encMotivacion === "a" ? 'bg-blue-50 border-movistar-blue' : 'bg-gray-50 border-gray-200'}`}>
                                                            <input type="radio" name="motivacion" value="a" checked={encMotivacion==="a"} onChange={e=>setEncMotivacion(e.target.value)} className="w-5 h-5 accent-movistar-blue"/>
                                                            <span className="text-[10px] font-black uppercase text-movistar-dark">a) Una convención donde vayan los mejores promotores</span>
                                                        </label>
                                                        <label className={`flex items-center gap-3 p-4 rounded-xl cursor-pointer transition-colors border ${encMotivacion === "b" ? 'bg-blue-50 border-movistar-blue' : 'bg-gray-50 border-gray-200'}`}>
                                                            <input type="radio" name="motivacion" value="b" checked={encMotivacion==="b"} onChange={e=>setEncMotivacion(e.target.value)} className="w-5 h-5 accent-movistar-blue"/>
                                                            <span className="text-[10px] font-black uppercase text-movistar-dark">b) Un día de descanso extra</span>
                                                        </label>
                                                        <label className={`flex items-center gap-3 p-4 rounded-xl cursor-pointer transition-colors border ${encMotivacion === "c" ? 'bg-blue-50 border-movistar-blue' : 'bg-gray-50 border-gray-200'}`}>
                                                            <input type="radio" name="motivacion" value="c" checked={encMotivacion==="c"} onChange={e=>setEncMotivacion(e.target.value)} className="w-5 h-5 accent-movistar-blue"/>
                                                            <span className="text-[10px] font-black uppercase text-movistar-dark">c) Un día conociendo la agencia/oficinas</span>
                                                        </label>
                                                        <label className={`flex items-center gap-3 p-4 rounded-xl cursor-pointer transition-colors border ${encMotivacion === "d" ? 'bg-blue-50 border-movistar-blue' : 'bg-gray-50 border-gray-200'}`}>
                                                            <input type="radio" name="motivacion" value="d" checked={encMotivacion==="d"} onChange={e=>setEncMotivacion(e.target.value)} className="w-5 h-5 accent-movistar-blue"/>
                                                            <span className="text-[10px] font-black uppercase text-movistar-dark">d) Un reconocimiento público o medalla</span>
                                                        </label>
                                                    </div>
                                                </div>
                                                <button type="submit" className="w-full bg-movistar-blue text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg mt-4 active:scale-95 transition-transform">ENVIAR RESPUESTAS</button>
                                            </form>
                                        ) : (
                                            <div className="bg-white p-10 rounded-[2rem] shadow-sm border text-center mt-4">
                                                <div className="text-5xl mb-4">🔒</div>
                                                <h3 className="font-black text-movistar-dark uppercase mb-2">Encuesta Cerrada</h3>
                                                <p className="text-[10px] font-bold text-gray-400">Por el momento, la encuesta de satisfacción no está disponible. ¡Gracias por participar anteriormente!</p>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {subTabPortal === "CALCULADORA" && (
                                    <div className="space-y-4">
                                        <div className="bg-movistar-dark p-6 rounded-[2rem] text-white shadow-xl">
                                            <h2 className="font-black text-lg italic uppercase">Simulador de Comisiones</h2>
                                            <p className="text-[9px] font-bold text-gray-400 mt-1">Proyecta tus comisiones semanales ingresando tus metas y ventas logradas.</p>
                                        </div>

                                        <div className="bg-white p-6 rounded-[2rem] shadow-xl border">
                                            {(userRole === "ADMIN" || userRole === "SUPERVISOR") && (
                                                <select value={calcCadena} onChange={e=>setCalcCadena(e.target.value)} className="w-full bg-blue-50 p-3 rounded-xl font-black text-[10px] text-movistar-blue mb-4 outline-none border border-blue-100">
                                                    <option value="ELEKTRA">CADENA: ELEKTRA</option>
                                                    <option value="COPPEL_SUBURBIA">CADENA: COPPEL / SUBURBIA</option>
                                                </select>
                                            )}

                                            <div className="bg-gray-50 p-4 rounded-2xl border mb-6">
                                                <h3 className="font-black text-[10px] text-movistar-dark uppercase mb-3 text-center">🎯 Metas Semanales</h3>
                                                <div className="grid grid-cols-2 gap-3 mb-3">
                                                    <div>
                                                        <label className="text-[8px] font-black text-gray-500 uppercase">Cuota Total</label>
                                                        <input type="number" placeholder="0" value={cuotaTotal} onChange={e=>setCuotaTotal(e.target.value)} className="w-full bg-white border p-3 rounded-xl font-black text-xs mt-1 outline-none text-center text-movistar-dark shadow-sm"/>
                                                    </div>
                                                    <div>
                                                        <label className="text-[8px] font-black text-gray-500 uppercase">Cuota TEMM</label>
                                                        <input type="number" placeholder="0" value={cuotaTemm} onChange={e=>setCuotaTemm(e.target.value)} className="w-full bg-white border p-3 rounded-xl font-black text-xs mt-1 outline-none text-center text-movistar-green shadow-sm"/>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div>
                                                        <label className="text-[8px] font-black text-gray-500 uppercase">Cuota Porta</label>
                                                        <input type="number" placeholder="0" value={cuotaPorta} onChange={e=>setCuotaPorta(e.target.value)} className="w-full bg-white border p-3 rounded-xl font-black text-xs mt-1 outline-none text-center text-movistar-blue shadow-sm"/>
                                                    </div>
                                                    <div>
                                                        <label className="text-[8px] font-black text-gray-500 uppercase">Cuota No Porta</label>
                                                        <input type="number" placeholder="0" value={cuotaNoPorta} onChange={e=>setCuotaNoPorta(e.target.value)} className="w-full bg-white border p-3 rounded-xl font-black text-xs mt-1 outline-none text-center text-gray-700 shadow-sm"/>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mb-6">
                                                <h3 className="font-black text-[10px] text-movistar-dark uppercase mb-3 text-center">📈 Ventas Logradas</h3>
                                                
                                                <div className="mb-3">
                                                    <h4 className="font-black text-[8px] text-movistar-blue mb-1 uppercase">Altas Portabilidad</h4>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        <input type="number" placeholder="$100" value={cP1} onChange={e=>setCP1(e.target.value)} className="bg-blue-50 border border-blue-100 p-3 rounded-xl text-center text-xs font-black outline-none text-movistar-blue"/>
                                                        <input type="number" placeholder="$150" value={cP2} onChange={e=>setCP2(e.target.value)} className="bg-blue-50 border border-blue-100 p-3 rounded-xl text-center text-xs font-black outline-none text-movistar-blue"/>
                                                        <input type="number" placeholder="$200" value={cP3} onChange={e=>setCP3(e.target.value)} className="bg-blue-50 border border-blue-100 p-3 rounded-xl text-center text-xs font-black outline-none text-movistar-blue"/>
                                                    </div>
                                                </div>
                                                
                                                <div className="mb-3">
                                                    <h4 className="font-black text-[8px] text-gray-500 mb-1 uppercase">Altas No Porta</h4>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        <input type="number" placeholder="$100" value={cNP1} onChange={e=>setCNP1(e.target.value)} className="bg-gray-50 border border-gray-200 p-3 rounded-xl text-center text-xs font-black outline-none text-gray-700"/>
                                                        <input type="number" placeholder="$150" value={cNP2} onChange={e=>setCNP2(e.target.value)} className="bg-gray-50 border border-gray-200 p-3 rounded-xl text-center text-xs font-black outline-none text-gray-700"/>
                                                        <input type="number" placeholder="$200" value={cNP3} onChange={e=>setCNP3(e.target.value)} className="bg-gray-50 border border-gray-200 p-3 rounded-xl text-center text-xs font-black outline-none text-gray-700"/>
                                                    </div>
                                                </div>

                                                <div className="mb-3">
                                                    <h4 className="font-black text-[8px] text-movistar-green mb-1 uppercase">Equipos TEMM</h4>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        <input type="number" placeholder="$100" value={cT1} onChange={e=>setCT1(e.target.value)} className="bg-green-50 border border-green-200 p-3 rounded-xl text-center text-xs font-black outline-none text-movistar-green"/>
                                                        <input type="number" placeholder="$150" value={cT2} onChange={e=>setCT2(e.target.value)} className="bg-green-50 border border-green-200 p-3 rounded-xl text-center text-xs font-black outline-none text-movistar-green"/>
                                                        <input type="number" placeholder="$200" value={cT3} onChange={e=>setCT3(e.target.value)} className="bg-green-50 border border-green-200 p-3 rounded-xl text-center text-xs font-black outline-none text-movistar-green"/>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-gray-50 p-4 rounded-2xl border mb-6 space-y-4">
                                                <h3 className="font-black text-[10px] text-movistar-dark uppercase text-center mb-2">📊 Resumen y Alcance</h3>
                                                
                                                <div>
                                                    <div className="flex justify-between items-end mb-1">
                                                        <span className="text-[9px] font-black text-movistar-dark uppercase">TOTAL ALTAS</span>
                                                        <span className="text-[10px] font-black text-movistar-dark">{sumTotal} / {cuotaTotal || 0} <span className="text-[8px] font-bold text-gray-400 ml-1">({alcanceTotal.toFixed(1)}%)</span></span>
                                                    </div>
                                                    <div className="progress-bar-container"><div className="progress-bar-fill bg-movistar-dark" style={{width: `${Math.min(alcanceTotal, 100)}%`}}></div></div>
                                                </div>
                                                
                                                <div>
                                                    <div className="flex justify-between items-end mb-1">
                                                        <span className="text-[9px] font-black text-movistar-green uppercase">EQUIPOS TEMM</span>
                                                        <span className="text-[10px] font-black text-movistar-green">{sumTemm} / {cuotaTemm || 0} <span className="text-[8px] font-bold text-gray-400 ml-1">({alcanceTemm.toFixed(1)}%)</span></span>
                                                    </div>
                                                    <div className="progress-bar-container"><div className="progress-bar-fill bg-movistar-green" style={{width: `${Math.min(alcanceTemm, 100)}%`}}></div></div>
                                                </div>
                                                
                                                <div className="grid grid-cols-2 gap-4 pt-2">
                                                    <div>
                                                        <div className="flex justify-between items-end mb-1">
                                                            <span className="text-[8px] font-black text-movistar-blue uppercase">PORTA</span>
                                                            <span className="text-[9px] font-black text-movistar-blue">{sumPorta} <span className="text-gray-400">/ {cuotaPorta || 0}</span></span>
                                                        </div>
                                                        <div className="progress-bar-container h-1.5"><div className="progress-bar-fill bg-movistar-blue" style={{width: `${Math.min(alcancePorta, 100)}%`}}></div></div>
                                                    </div>
                                                    <div>
                                                        <div className="flex justify-between items-end mb-1">
                                                            <span className="text-[8px] font-black text-gray-600 uppercase">NO PORTA</span>
                                                            <span className="text-[9px] font-black text-gray-600">{sumNoPorta} <span className="text-gray-400">/ {cuotaNoPorta || 0}</span></span>
                                                        </div>
                                                        <div className="progress-bar-container h-1.5"><div className="progress-bar-fill bg-gray-500" style={{width: `${Math.min(alcanceNoPorta, 100)}%`}}></div></div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-movistar-green text-white p-6 rounded-2xl text-center shadow-lg relative overflow-hidden">
                                                <div className="relative z-10">
                                                    <p className="text-[10px] font-bold uppercase mb-1">
                                                        Pago Estimado <br/>
                                                        <span className="text-[8px] opacity-80">(Alcance Total: {alcanceTotal < 80 ? '<80%' : alcanceTotal < 95 ? 'T1' : alcanceTotal < 100 ? 'T2' : 'T3'} | Alcance TEMM: {alcanceTemm < 80 ? '<80%' : alcanceTemm < 95 ? 'T1' : alcanceTemm < 100 ? 'T2' : 'T3'})</span>
                                                    </p>
                                                    <p className="text-5xl font-black">${calculatePayout()}</p>
                                                </div>
                                                <div className="absolute -right-4 -top-4 opacity-10 text-8xl">💰</div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {subTabPortal === "VACACIONES" && (
                                    <div className="space-y-4">
                                        <div className="bg-movistar-dark p-6 rounded-[2rem] text-white shadow-xl">
                                            <h2 className="font-black text-lg italic uppercase">Días Libres</h2>
                                            <p className="text-[9px] font-bold text-gray-400 mt-1">Gestiona y envía tus solicitudes de días de descanso al equipo administrativo.</p>
                                        </div>

                                        {userRole === "PROMOTOR" ? (
                                            <div className="bg-white p-6 rounded-[2rem] shadow-xl border">
                                                <form onSubmit={submitVac} className="space-y-4">
                                                    <input type="text" placeholder="Nombre" required value={vacName} onChange={e=>setVacName(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none"/>
                                                    <input type="text" placeholder="Usuario FW" required value={vacUser} onChange={e=>setVacUser(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none"/>
                                                    <div><label className="text-[9px] font-black text-gray-400 ml-2">Inicio (Min 15 días)</label><input type="date" required min={minVacDate} value={vacDate} onChange={e=>setVacDate(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none mt-1"/></div>
                                                    <div><label className="text-[9px] font-black text-gray-400 ml-2">Días a pedir</label><input type="number" min="1" max="14" required value={vacDays} onChange={e=>setVacDays(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none mt-1"/></div>
                                                    <button type="submit" className="w-full bg-movistar-blue text-white p-4 rounded-xl font-black text-[10px] active:scale-95 transition-transform">ENVIAR SOLICITUD</button>
                                                </form>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {vacaciones.map(v => (
                                                    <div key={v.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm border-l-4 border-movistar-blue relative">
                                                        {userRole === "ADMIN" && <button onClick={() => deleteDoc("vacaciones", v.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-500 rounded-full w-6 h-6 flex items-center justify-center font-bold text-[10px] shadow-sm active:scale-90">X</button>}
                                                        <div className="flex justify-between w-11/12"><span className="text-[9px] font-black text-movistar-blue">{v.idpdv}</span><span className="text-[8px] font-bold text-gray-400">{v.fecha?.toDate().toLocaleDateString()}</span></div>
                                                        <h4 className="font-black text-xs uppercase my-1">{v.nombre}</h4>
                                                        <p className="text-[10px] font-bold text-gray-500">Pide <span className="text-movistar-dark font-black">{v.diasSolicitados} días</span> desde <span className="text-movistar-dark font-black">{v.fechaDeseada}</span></p>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {subTabPortal === "QUEJAS" && (
                                    <div className="space-y-4">
                                        <div className="bg-gradient-to-r from-orange-400 to-red-500 p-6 rounded-[2rem] text-white shadow-lg relative overflow-hidden">
                                            <div className="relative z-10">
                                                <h3 className="font-black text-lg italic uppercase mb-2">¡Ayúdanos a mejorar!</h3>
                                                <p className="text-[10px] font-bold leading-relaxed opacity-90">
                                                    Si tienes alguna sugerencia, o algo que nos quieras comentar acerca de tus jefes o los comunicados, <strong>te leeremos con gusto.</strong> Toda la información se trata con profesionalismo.
                                                </p>
                                            </div>
                                            <div className="absolute -right-4 -bottom-4 opacity-20 text-7xl">💬</div>
                                        </div>

                                        {userRole === "PROMOTOR" ? (
                                            <div className="bg-white p-6 rounded-[2rem] shadow-xl border">
                                                <h2 className="text-lg font-black mb-2 uppercase text-movistar-dark">Buzón Operativo</h2>
                                                <form onSubmit={submitSug} className="space-y-4 mt-4">
                                                    <textarea required placeholder="Escribe aquí tu sugerencia o aclaración..." rows="5" value={sugText} onChange={e=>setSugText(e.target.value)} className="w-full bg-gray-50 p-4 rounded-xl font-bold text-xs outline-none resize-none"></textarea>
                                                    <button type="submit" className="w-full bg-movistar-dark text-white p-4 rounded-xl font-black text-[10px] active:scale-95 transition-transform">ENVIAR BUZÓN</button>
                                                </form>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {quejas.map(q => (
                                                    <div key={q.id} className="bg-white p-5 rounded-[1.5rem] shadow-sm border-l-4 border-movistar-red relative">
                                                        {userRole === "ADMIN" && <button onClick={() => deleteDoc("quejas", q.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-500 rounded-full w-6 h-6 flex items-center justify-center font-bold text-[10px] shadow-sm active:scale-90">X</button>}
                                                        <div className="flex justify-between mb-2 w-11/12"><span className="text-[9px] font-black text-movistar-red">ID: {q.idpdv}</span><span className="text-[8px] font-bold text-gray-400">{q.fecha?.toDate().toLocaleDateString()}</span></div>
                                                        <p className="text-xs font-bold text-gray-600 italic">"{q.texto}"</p>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
